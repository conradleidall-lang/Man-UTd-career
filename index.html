      budget: 150, tables: {}, clStandings: {}, cupRounds: { FA: [], EFL: [] },
      fixtures: [], results: [], trophies: [], currentMatch: null,
      seasonStats: { played:0, won:0, drawn:0, lost:0, gf:0, ga:0 },
      transferMessages: [],
      market: TRANSFER_POOL.map((p,i) => ({
        id: i, name: p[0], pos: p[1], age: p[2], ovr: p[3], pot: p[4],
        club: p[5], price: p[6], status: 'available'
      })),
      shortlist: [], windowOpen: true, finished: false
    };
    initTables(); buildFixtures(); autoPickXI(); render();
  }

  function initTables() {
    G.tables['Man Utd'] = { P:0,W:0,D:0,L:0,GF:0,GA:0,Pts:0 };
    PL_TEAMS.forEach(t => G.tables[t[0]] = { P:0,W:0,D:0,L:0,GF:0,GA:0,Pts:0 });
    const eu = [...EURO_TEAMS].sort(()=>Math.random()-0.5).slice(0,6);
    G.clOpponents = [...eu.map(t => ({name:t[0],short:t[1],strength:t[2]})),
      ...['Liverpool','Arsenal'].map(n => { const t = PL_TEAMS.find(x=>x[0]===n); return {name:t[0],short:t[1],strength:t[2]}; })];
    G.clStandings = {};
    [...G.clOpponents.map(t=>t.name),'Man Utd'].forEach(n => G.clStandings[n] = {P:0,W:0,D:0,L:0,GF:0,GA:0,Pts:0});
  }
  function dayToDate(d) { let y = 2025, doy = d; while (doy > 365) { doy -= 365; y++; } let m = 0, dd = doy; while (dd > DOM[m]) { dd -= DOM[m]; m++; } return { day: dd, mon: m, year: y }; }
  function fmtDate(d) { const x = dayToDate(d); return x.day + ' ' + MONTHS[x.mon]; }
  function fmtDateLong(d) { const x = dayToDate(d); return x.day + ' ' + MONTHS[x.mon] + ' ' + x.year; }

  function buildFixtures() {
    G.fixtures = []; let id = 0;
    const opps = [...PL_TEAMS, ...PL_TEAMS].sort(()=>Math.random()-0.5);
    const homeAway = opps.map((_,i) => i % 2 === 0);
    const plStart = 222, plEnd = 510, plSpacing = Math.floor((plEnd - plStart) / 38);
    for (let i = 0; i < 38; i++) {
      const day = plStart + i*plSpacing + Math.floor(Math.random()*3) - 1;
      G.fixtures.push({ id:id++, day, comp:'PL', opp:opps[i][0], oppShort:opps[i][1], oppStr:opps[i][2], home: homeAway[i], played:false });
    }
    G.fixtures.push({ id:id++, day: 260, comp:'EFL', opp:'Walsall', oppShort:'WAL', oppStr:62, home:true, played:false, round:'R3' });
    G.fixtures.push({ id:id++, day: 374, comp:'FA', opp:'Sheffield Wed', oppShort:'SHW', oppStr:67, home:true, played:false, round:'R3' });
    const clDays = [255, 275, 290, 312, 335, 355, 372, 395];
    G.clOpponents.slice(0,8).forEach((opp, i) => {
      G.fixtures.push({ id:id++, day: clDays[i] + Math.floor(Math.random()*3), comp:'CL', opp:opp.name, oppShort:opp.short, oppStr:opp.strength, home: i%2===0, played:false, round:'League' });
    });
    G.fixtures.sort((a,b) => a.day - b.day);
  }

  function nextFixture() { return G.fixtures.find(f => !f.played); }
  function tierOf(ovr) { if (ovr >= 92) return 'super'; if (ovr >= 88) return 'star'; if (ovr >= 82) return 'solid'; return 'depth'; }
  function matchWeight(fx) {
    if (fx.round === 'Final' || fx.round === 'SF') return 2.5;
    if (fx.comp === 'CL' && fx.round !== 'League') return 2.5;
    if (fx.comp === 'CL') return 1.8;
    if (fx.oppStr >= 84) return 2.0;
    if (fx.oppStr >= 80) return 1.5;
    if (fx.comp === 'PL') return 1.0;
    if (fx.oppStr <= 70) return 0.4;
    return 0.8;
  }
  function getFormStatus(p) {
    const recent = p.matchRatings.slice(-5);
    if (recent.length === 0) return 'Neutral';
    const avg = recent.reduce((a,b)=>a+b,0) / recent.length;
    if (avg >= 7.7) return 'Elite'; if (avg >= 7.1) return 'Good'; if (avg >= 6.5) return 'Neutral'; return 'Poor';
  }
  function getSquadRole(p) {
    if (p.sold) return '—';
    if (p.newSigning && p.appearances < 5) return 'Prove-it';
    const byPos = G.squad.filter(x => !x.sold && x.pos === p.pos).sort((a,b) => b.mins - a.mins);
    const posRank = byPos.findIndex(x => x.id === p.id);
    const allSorted = G.squad.filter(x => !x.sold).sort((a,b) => b.mins - a.mins);
    const overallRank = allSorted.findIndex(x => x.id === p.id);
    if (overallRank < 11 && posRank === 0) return 'Locked Starter';
    if (overallRank < 11) return 'Strong Starter';
    if (overallRank < 17) return 'Rotation';
    if (p.age <= 22) return 'Prospect';
    return 'Bench';
  }
  function isBigGame(fx) { return matchWeight(fx) >= 1.8; }
  function effectiveRating(p) {
    let r = p.ovr;
    const form = getFormStatus(p);
    if (form === 'Elite') r += 2;
    else if (form === 'Good') r += 1;
    else if (form === 'Poor') r -= 1;
    r += (p.morale - 75) / 25;
    r -= (100 - p.fitness) / 20;
    if (p.newSigning && p.appearances < 5) r -= 2;
    return r;
  }
  function formBonus(p) { const f = getFormStatus(p); if (f === 'Elite') return 2; if (f === 'Good') return 1; if (f === 'Poor') return -1; return 0; }
  function isInForm(p) { return getFormStatus(p) === 'Elite'; }
  function isAvailable(p) { return !p.sold && !p.onLoan && !p.injuryWeeks; }
  function getFormationSlots(f) {
    return f === '4-3-3' ? [1,4,3,3] : f === '4-2-3-1' ? [1,4,5,1] : f === '4-4-2' ? [1,4,4,2]
      : f === '3-5-2' ? [1,3,5,2] : f === '5-3-2' ? [1,5,3,2] : [1,4,3,3];
  }

  function computeMatchRating(p, fx, perf) {
    let r = 6.5;
    r += (perf.goals || 0) * 0.7;
    r += (perf.assists || 0) * 0.4;
    if (perf.result === 'W') r += 0.2;
    else if (perf.result === 'L') r -= 0.2;
    if ((p.pos === 'DEF' || p.pos === 'GK') && perf.cleanSheet) r += 0.5;
    if (p.pos === 'GK' && !perf.cleanSheet) r -= 0.1 * perf.goalsConceded;
    r += (fx.oppStr - 75) * 0.022;
    r += (Math.random() - 0.45) * 0.9;
    r += (Math.random() - 0.5) * 0.4;
    if (isBigGame(fx) && r > 7.0) r += 0.2;
    return Math.max(4.0, Math.min(10.0, r));
  }

  function updatePlayerRatings(seasonEnd) {
    const progress = G.seasonStats.played / 38;
    const early = progress < 0.35;
    const evals = G.squad.filter(p => !p.sold && p.matchRatings.length >= 3).map(p => {
      const recent = p.matchRatings.slice(-10);
      const weights = recent.map((_, i) => i + 1);
      const sumW = weights.reduce((a,b)=>a+b,0);
      const weighted = recent.reduce((a, r, i) => a + r * weights[i], 0) / sumW;
      const bigGames = p.bigGameRatings.slice(-6);
      const bigAvg = bigGames.length > 0 ? bigGames.reduce((a,b)=>a+b,0)/bigGames.length : weighted;
      const composite = weighted * 0.6 + bigAvg * 0.4;
      return { p, composite, weighted, bigAvg, bigCount: bigGames.length };
    });
    evals.forEach(e => {
      const c = e.composite;
      if (c >= 8.0) e.target = 93;
      else if (c >= 7.7) e.target = 90;
      else if (c >= 7.5) e.target = 88;
      else if (c >= 7.25) e.target = 85;
      else if (c >= 7.0) e.target = 83;
      else if (c >= 6.7) e.target = 80;
      else if (c >= 6.4) e.target = 77;
      else e.target = 73;
    });
    evals.sort((a,b) => b.composite - a.composite);
    evals.forEach(e => {
      const p = e.p;
      const role = getSquadRole(p);
      const diff = e.target - p.ovr;
      let maxMove = early ? 2 : 1;
      if (role === 'Bench' || role === 'Prove-it') maxMove = Math.min(maxMove, 1);
      if (role === 'Rotation' && diff > 0 && e.composite < 7.3) maxMove = Math.min(maxMove, 1);
      let delta = Math.sign(diff) * Math.min(Math.abs(diff), maxMove);
      if (delta >= 1 && e.weighted < 7.0) delta = 0;
      if (delta >= 2 && (e.bigCount < 2 || e.composite < 7.8)) delta = 1;
      if (delta <= -1 && e.weighted > 6.6) delta = 0;
      if (delta <= -2 && e.weighted > 5.8) delta = -1;
      if (delta > 0) {
        const newOvr = p.ovr + delta;
        const newTier = tierOf(newOvr);
        if (newTier === 'super') {
          const samePosSuper = G.squad.filter(x => !x.sold && x.id !== p.id && x.pos === p.pos && tierOf(x.ovr) === 'super');
          if (samePosSuper.length >= 1 && e.composite < 8.1) delta = Math.min(delta, 91 - p.ovr);
        }
        if (newTier === 'star') {
          const samePosStar = G.squad.filter(x => !x.sold && x.id !== p.id && x.pos === p.pos && tierOf(x.ovr) === 'star').length;
          if (samePosStar >= 2 && e.composite < 7.6) delta = Math.min(delta, 87 - p.ovr);
        }
      }
      if (delta > 0) delta = Math.min(delta, p.pot - p.ovr);
      if (seasonEnd) {
        if (p.age >= 31) {
          let loss = 0;
          if (p.age >= 33) loss += 1; if (p.age >= 35) loss += 1; if (p.age >= 37) loss += 1;
          delta = Math.min(delta - loss, delta);
        }
        if (p.ovr >= 88 && p.age < 31) delta = Math.min(delta, 0);
      }
      p.ovr = Math.max(50, Math.min(99, p.ovr + delta));
      p.lastUpdate = G.day;
    });
    G.squad.forEach(p => { if (p.newSigning && p.appearances >= 5) p.newSigning = false; });
  }

  function autoPickXI() {
    const avail = G.squad.filter(isAvailable).sort((a,b) => effectiveRating(b) - effectiveRating(a));
    const by = { GK: avail.filter(p=>p.pos==='GK'), DEF: avail.filter(p=>p.pos==='DEF'), MID: avail.filter(p=>p.pos==='MID'), FWD: avail.filter(p=>p.pos==='FWD') };
    const f = getFormationSlots(G.formation);
    const xi = [...by.GK.slice(0,f[0]), ...by.DEF.slice(0,f[1]), ...by.MID.slice(0,f[2]), ...by.FWD.slice(0,f[3])];
    if (xi.length < 11) { const filler = avail.filter(p => !xi.includes(p)).slice(0, 11 - xi.length); xi.push(...filler); }
    G.starters = xi.slice(0,11).map(p => p.id);
  }
  function setFreshestXI() {
    const avail = G.squad.filter(isAvailable);
    const by = { GK: [], DEF: [], MID: [], FWD: [] };
    avail.forEach(p => by[p.pos].push(p));
    Object.keys(by).forEach(k => by[k].sort((a,b) => (effectiveRating(b) + b.fitness/4) - (effectiveRating(a) + a.fitness/4)));
    const f = getFormationSlots(G.formation);
    const xi = [...by.GK.slice(0,f[0]), ...by.DEF.slice(0,f[1]), ...by.MID.slice(0,f[2]), ...by.FWD.slice(0,f[3])];
    if (xi.length < 11) { const filler = avail.filter(p => !xi.includes(p)).sort((a,b) => b.fitness - a.fitness).slice(0, 11 - xi.length); xi.push(...filler); }
    G.starters = xi.slice(0,11).map(p => p.id);
    render();
  }
  function getXI() { return G.starters.map(id => G.squad.find(p => p.id === id)).filter(Boolean); }

  function startPlayer(id) {
    const p = G.squad.find(x => x.id === id);
    if (!p || p.sold || p.injuryWeeks > 0 || G.starters.includes(id)) return;
    const positionStarters = G.starters.map(sid => G.squad.find(x => x.id === sid))
      .filter(s => s && s.pos === p.pos).sort((a,b) => effectiveRating(a) - effectiveRating(b));
    const required = getFormationSlots(G.formation)[{GK:0,DEF:1,MID:2,FWD:3}[p.pos]];
    if (positionStarters.length >= required && positionStarters.length > 0) {
      const swap = positionStarters[0];
      G.starters = G.starters.map(sid => sid === swap.id ? id : sid);
    } else {
      G.starters.push(id);
      if (G.starters.length > 11) {
        const overall = G.starters.map(sid => G.squad.find(x => x.id === sid)).sort((a,b) => effectiveRating(a) - effectiveRating(b));
        G.starters = G.starters.filter(sid => sid !== overall[0].id);
      }
    }
    render();
  }
  function benchPlayer(id) {
    if (!G.starters.includes(id)) return;
    const p = G.squad.find(x => x.id === id);
    const candidates = G.squad.filter(x => !x.sold && x.injuryWeeks === 0 && !G.starters.includes(x.id) && x.pos === p.pos)
      .sort((a,b) => effectiveRating(b) - effectiveRating(a));
    if (candidates.length > 0) {
      G.starters = G.starters.map(sid => sid === id ? candidates[0].id : sid);
    } else {
      G.starters = G.starters.filter(sid => sid !== id);
    }
    render();
  }

  function playFixture(fx) {
    G.currentMatch = { fx, home:0, away:0, comm:[], playing:true, done:false, scorers: [], assists: [], injured: [], perPlayerGoals: {}, perPlayerAssists: {} };
    G.view = 'match';
    const xi = getXI();
    const munStr = xi.reduce((s,p)=>s+effectiveRating(p),0) / Math.max(1,xi.length);
    const tAtk = {attack:5,balanced:0,defensive:-3}[G.tactic];
    const tDef = {attack:-4,balanced:0,defensive:5}[G.tactic];
    const hAdv = fx.home ? 2 : -1;
    const munAtk = munStr + tAtk + hAdv, munDef = munStr + tDef + hAdv;
    const oppAtk = fx.oppStr, oppDef = fx.oppStr;
    const attackers = xi.filter(p => p.pos==='FWD' || p.pos==='MID');
    const oppRoster = PL_TEAMS.find(t=>t[0]===fx.opp)?.[3];
    const oppNames = Array.isArray(oppRoster) ? oppRoster : ['Smith','Walker','Cole','Davies','Wilson'];
    const minutes = [4,12,21,29,38,45,53,62,70,78,85,90];
    let i = 0;
    const tick = setInterval(() => {
      if (i >= minutes.length) { clearInterval(tick); finishMatch(); return; }
      const m = minutes[i++];
      const cm = G.currentMatch;
      const xiNow = getXI().filter(p => !cm.injured.includes(p.id));
      xiNow.forEach(p => {
        const injChance = 0.011 + (100 - p.fitness) * 0.0008;
        if (Math.random() < injChance) {
          const weeks = 1 + Math.floor(Math.random() * 8);
          cm.injured.push(p.id); p.injuryWeeks = weeks;
          cm.comm.push({m, text:'Injury — ' + p.name + ' hobbles off. Out ' + weeks + ' week' + (weeks>1?'s':'') + '.', t:'inj'});
        }
      });
      const r = Math.random();
      if (r < 0.34) {
        const ch = Math.max(0.07, (munAtk - oppDef)/85 + 0.32);
        if (Math.random() < ch) {
          const pool = attackers.length ? attackers : xi;
          const s = PICK(pool);
          cm.home++; s.goals++; cm.scorers.push(s.id);
          cm.perPlayerGoals[s.id] = (cm.perPlayerGoals[s.id] || 0) + 1;
          if (Math.random() < 0.55) {
            const assisters = pool.filter(p => p.id !== s.id);
            if (assisters.length) {
              const a = PICK(assisters); a.assists++;
              cm.assists.push(a.id); cm.perPlayerAssists[a.id] = (cm.perPlayerAssists[a.id] || 0) + 1;
              cm.comm.push({m, text:'Goal! ' + s.name + ' finishes, assisted by ' + a.name + '. (' + cm.home + '-' + cm.away + ')', t:'gm'});
              return;
            }
          }
          cm.comm.push({m, text:'Goal! ' + s.name + ' finishes for Man Utd. (' + cm.home + '-' + cm.away + ')', t:'gm'});
        } else {
          const a = PICK(attackers.length ? attackers : xi);
          cm.comm.push({m, text: PICK([a.name + ' fires just wide.', a.name + "'s effort is saved.", a.name + ' smashes the post!']), t:'cm'});
        }
      } else if (r < 0.62) {
        const ch = Math.max(0.07, (oppAtk - munDef)/85 + 0.30);
        if (Math.random() < ch) {
          cm.away++;
          cm.comm.push({m, text: fx.opp + ' score. ' + PICK(oppNames) + ' beats Onana from close range. (' + cm.home + '-' + cm.away + ')', t:'go'});
        } else {
          cm.comm.push({m, text: PICK([PICK(oppNames) + ' threatens, smothered.', fx.opp + ' push forward, blocked.']), t:'co'});
        }
      } else {
        cm.comm.push({m, text: PICK(['Possession changes hands.', (PICK(xi.filter(p=>p.pos==='MID'))||PICK(xi)).name + ' wins it back.', fx.opp + ' controlling tempo.', PICK(xi).name + ' booked.']), t:'n'});
      }
      render();
      const log = document.getElementById('comm-log'); if (log) log.scrollTop = log.scrollHeight;
    }, 600);
  }

  function finishMatch() {
    const cm = G.currentMatch, fx = cm.fx;
    cm.playing = false; cm.done = true;
    cm.comm.push({m:'FT', text:'Full time. Man Utd ' + cm.home + ' - ' + cm.away + ' ' + fx.opp + '.', t:'ft'});
    const xi = getXI();
    const result = cm.home > cm.away ? 'W' : cm.home === cm.away ? 'D' : 'L';
    const cleanSheet = cm.away === 0;
    cm.matchRatings = {};
    xi.forEach(p => {
      p.mins += 90; p.appearances++;
      p.fitness = Math.max(15, p.fitness - 18 - Math.random()*12);
      const perf = { goals: cm.perPlayerGoals[p.id] || 0, assists: cm.perPlayerAssists[p.id] || 0, result, cleanSheet, goalsConceded: cm.away };
      const mr = computeMatchRating(p, fx, perf);
      cm.matchRatings[p.id] = mr;
      p.matchRatings.push(mr);
      if (isBigGame(fx)) p.bigGameRatings.push(mr);
      if (result === 'W') p.morale = Math.min(100, p.morale + 5);
      else if (result === 'D') p.morale = Math.min(100, p.morale + 1);
      else p.morale = Math.max(0, p.morale - 4);
      if (perf.goals > 0) p.morale = Math.min(100, p.morale + 5);
    });
    G.squad.forEach(p => {
      if (p.sold || G.starters.includes(p.id) || p.injuryWeeks > 0) return;
      p.fitness = Math.min(100, p.fitness + 22);
      p.morale = Math.max(0, p.morale - 2);
    });
    fx.played = true; fx.score = cm.home + '-' + cm.away;
    G.results.push(Object.assign({}, fx, { munGoals: cm.home, oppGoals: cm.away }));
    G.seasonStats.played++; G.seasonStats.gf += cm.home; G.seasonStats.ga += cm.away;
    if (result === 'W') G.seasonStats.won++;
    else if (result === 'L') G.seasonStats.lost++;
    else G.seasonStats.drawn++;
    if (fx.comp === 'PL') { updatePLTable(fx, cm.home, cm.away); simOtherPLWeek(fx); }
    if (fx.comp === 'CL') updateCLTable(fx, cm.home, cm.away);
    if (fx.comp === 'FA' || fx.comp === 'EFL') handleCupRound(fx, cm.home, cm.away);
    if (G.seasonStats.played % 4 === 0) updatePlayerRatings(false);
    G.currentMatch = cm;
    render();
  }

  function updatePLTable(fx, mg, og) {
    const mun = G.tables['Man Utd'], opp = G.tables[fx.opp];
    mun.P++; opp.P++; mun.GF+=mg; mun.GA+=og; opp.GF+=og; opp.GA+=mg;
    if (mg>og) { mun.W++; mun.Pts+=3; opp.L++; }
    else if (mg<og) { mun.L++; opp.W++; opp.Pts+=3; }
    else { mun.D++; opp.D++; mun.Pts++; opp.Pts++; }
  }
  function simOtherPLWeek(fx) {
    const teams = ['Man Utd', ...PL_TEAMS.map(t=>t[0])].filter(n => n !== 'Man Utd' && n !== fx.opp);
    const shuf = teams.sort(()=>Math.random()-0.5);
    for (let i=0; i+1<shuf.length; i+=2) {
      const a = shuf[i], b = shuf[i+1];
      const sa = PL_TEAMS.find(t=>t[0]===a)?.[2] || 75;
      const sb = PL_TEAMS.find(t=>t[0]===b)?.[2] || 75;
      const ag = Math.max(0, Math.floor((sa - sb + 75 + Math.random()*15)/30));
      const bg = Math.max(0, Math.floor((sb - sa + 75 + Math.random()*15)/30));
      const ta = G.tables[a], tb = G.tables[b];
      ta.P++; tb.P++; ta.GF+=ag; ta.GA+=bg; tb.GF+=bg; tb.GA+=ag;
      if (ag>bg) { ta.W++; ta.Pts+=3; tb.L++; }
      else if (ag<bg) { tb.W++; tb.Pts+=3; ta.L++; }
      else { ta.D++; tb.D++; ta.Pts++; tb.Pts++; }
    }
  }
  function updateCLTable(fx, mg, og) {
    const mun = G.clStandings['Man Utd'], opp = G.clStandings[fx.opp];
    if (!mun || !opp) return;
    mun.P++; opp.P++; mun.GF+=mg; mun.GA+=og; opp.GF+=og; opp.GA+=mg;
    if (mg>og) { mun.W++; mun.Pts+=3; opp.L++; }
    else if (mg<og) { mun.L++; opp.W++; opp.Pts+=3; }
    else { mun.D++; opp.D++; mun.Pts++; opp.Pts++; }
  }
  function handleCupRound(fx, mg, og) {
    const won = mg > og || (mg === og && Math.random() < 0.5);
    G.cupRounds[fx.comp].push({round:fx.round, opp:fx.opp, score:mg + '-' + og, won});
    if (won) scheduleNextCupRound(fx);
    else G.transferMessages.push((fx.comp === 'FA' ? 'FA Cup' : 'EFL Cup') + ' exit — lost ' + mg + '-' + og + ' to ' + fx.opp + '.');
  }
  function scheduleNextCupRound(fx) {
    const nextRounds = fx.comp === 'FA' ? ['R3','R4','R5','QF','SF','Final'] : ['R3','R4','QF','SF','Final'];
    const idx = nextRounds.indexOf(fx.round);
    if (idx < 0 || idx + 1 >= nextRounds.length) return;
    const next = nextRounds[idx + 1];
    const oppPool = next === 'Final' || next === 'SF' ? PL_TEAMS.slice(0,8) : [...PL_TEAMS, ['Coventry','COV',68],['QPR','QPR',66]];
    const opp = PICK(oppPool);
    G.fixtures.push({ id: G.fixtures.length, day: fx.day + 28, comp: fx.comp, opp: opp[0], oppShort: opp[1], oppStr: opp[2], home: Math.random()<0.5, played:false, round: next });
    G.fixtures.sort((a,b) => a.day - b.day);
  }

  function closeMatch() {
    const cm = G.currentMatch;
    if (cm && (cm.fx.comp === 'FA' || cm.fx.comp === 'EFL') && cm.fx.round === 'Final' && cm.home > cm.away) {
      G.trophies.push(G.year + '-' + (G.year+1).toString().slice(2) + ' ' + (cm.fx.comp === 'FA' ? 'FA Cup' : 'EFL Cup'));
    }
    G.day = cm ? cm.fx.day + 1 : G.day + 1;
    G.currentMatch = null;
    if (G.day > 510 && !G.fixtures.some(f => !f.played)) endSeason();
    else G.view = 'dash';
    render();
  }

  function endSeason() {
    const munPos = leagueSorted().findIndex(t => t.name==='Man Utd') + 1;
    if (munPos === 1) G.trophies.push(G.year + '-' + (G.year+1).toString().slice(2) + ' Premier League');
    updatePlayerRatings(true);
    G.squad.forEach(p => {
      if (p.sold) return;
      p.age++;
      p.mins = 0; p.goals = 0; p.assists = 0; p.appearances = 0;
      p.matchRatings = []; p.bigGameRatings = [];
      p.fitness = 100; p.morale = Math.max(60, p.morale);
      p.injuryWeeks = 0; p.onLoan = null;
      if (p.age >= 38 && p.ovr < 65) p.sold = true;
    });
    G.season++; G.year++;
    G.day = 220 + (G.season-1)*365;
    G.seasonStats = { played:0, won:0, drawn:0, lost:0, gf:0, ga:0 };
    G.results = []; G.fixtures = []; G.cupRounds = { FA: [], EFL: [] };
    G.budget += 80; G.windowOpen = true;
    G.view = 'season-end';
    initTables(); buildFixtures(); autoPickXI(); render();
  }

  function advance() {
    const fx = nextFixture();
    if (!fx) { endSeason(); return; }
    const daysBetween = Math.max(1, fx.day - G.day);
    G.squad.forEach(p => {
      p.fitness = Math.min(100, p.fitness + daysBetween * 8);
      if (p.injuryWeeks > 0) p.injuryWeeks = Math.max(0, p.injuryWeeks - daysBetween/7);
    });
    G.day = fx.day;
    const stillValid = G.starters.map(id => G.squad.find(p => p.id === id)).filter(p => p && isAvailable(p));
    if (stillValid.length < 11) autoPickXI();
    playFixture(fx);
  }

  function leagueSorted() {
    return Object.entries(G.tables).map(([name,s]) => ({name, ...s, GD: s.GF - s.GA}))
      .sort((a,b) => b.Pts - a.Pts || b.GD - a.GD || b.GF - a.GF);
  }

  function bidForPlayer(id) {
    const target = G.market.find(p => p.id === id);
    if (!target || target.status !== 'available') return;
    if (G.budget < target.price) { G.transferMessages.push('Bid for ' + target.name + ' rejected — over budget.'); render(); return; }
    const chance = target.ovr >= 88 ? 0.45 : target.ovr >= 85 ? 0.65 : 0.85;
    if (Math.random() < chance) {
      G.budget -= target.price;
      target.status = 'signed';
      const newId = Math.max(...G.squad.map(p=>p.id)) + 1;
      G.squad.push({ id:newId, name:target.name, pos:target.pos, age:target.age, ovr:target.ovr, pot:target.pot,
        mins:0, goals:0, assists:0, appearances:0, matchRatings: [], bigGameRatings: [], lastUpdate: G.day,
        fitness:100, morale:75, injuryWeeks:0, newSigning: true, sold:false, onLoan:null });
      G.transferMessages.push('Signed ' + target.name + ' from ' + target.club + ' for £' + target.price + 'm.');
      autoPickXI();
    } else {
      if (target.ovr >= 84) {
        const counter = Math.round(target.price * 1.2);
        G.transferMessages.push(target.club + ' rejected our bid. They want £' + counter + 'm for ' + target.name + '.');
        target.price = counter;
      } else {
        G.transferMessages.push(target.club + ' rejected our bid for ' + target.name + '.');
      }
    }
    render();
  }
  function sellPlayer(id) {
    const p = G.squad.find(x=>x.id===id);
    if (!p || p.sold) return;
    const price = Math.round((p.ovr - 60) * 4 + (p.pot - p.ovr) * 3);
    p.sold = true; G.budget += price;
    G.transferMessages.push('Sold ' + p.name + ' for £' + price + 'm.');
    autoPickXI(); render();
  }
  function toggleShortlist(id) {
    const i = G.shortlist.indexOf(id);
    if (i >= 0) G.shortlist.splice(i, 1); else G.shortlist.push(id);
    render();
  }

  function scoutRecommendations() {
    const byPos = { GK:[], DEF:[], MID:[], FWD:[] };
    G.squad.filter(p => !p.sold).forEach(p => byPos[p.pos].push(p));
    return G.market.filter(p => p.status === 'available').map(p => {
      const inPos = (byPos[p.pos] || []).sort((a,b) => b.ovr - a.ovr);
      const topInPos = inPos[0]?.ovr || 0;
      const depth = inPos.length;
      let need = 0;
      if (p.ovr > topInPos) need += (p.ovr - topInPos) * 2.5;
      if (depth < (p.pos === 'GK' ? 2 : 4)) need += (4 - depth) * 4;
      if (p.pot - p.ovr >= 6 && p.age <= 22) need += 8;
      if (p.age <= 20 && p.pot >= 88) need += 6;
      if (p.price > G.budget) need -= 25;
      else if (p.price > G.budget * 0.6) need -= 6;
      return Object.assign({}, p, { need });
    }).sort((a,b) => b.need - a.need).slice(0, 12);
  }
  function scoutReport(p) {
    const traits = { FWD: ['clinical finisher','elite movement','aerial threat','blistering pace'],
      MID: ['midfield general','press-resistant','creative engine','tireless runner'],
      DEF: ['commanding centre-back','reads the game brilliantly','reliable 1v1','aerial dominance'],
      GK: ['elite shot-stopper','commanding presence','sweeper-keeper instincts'] };
    const reasons = [];
    if (p.ovr >= 88) reasons.push('world-class quality');
    else if (p.ovr >= 85) reasons.push('top-tier performer');
    if (p.pot - p.ovr >= 6 && p.age <= 22) reasons.push('huge growth ceiling');
    if (p.age <= 19) reasons.push('teenage prodigy');
    if (p.ovr >= 85 && p.age >= 30) reasons.push('proven winner');
    if (reasons.length === 0) reasons.push('solid first-team option');
    reasons.push(PICK(traits[p.pos]));
    return reasons.slice(0,2).join(' — ') + '.';
  }

  function render() {
    const root = document.getElementById('gr');
    if (!root) return;
    const munPos = leagueSorted().findIndex(t => t.name==='Man Utd') + 1;
    const next = nextFixture();
    const header = '<div class="hdr">' +
      '<div class="hs"><div class="hsl">Season</div><div class="hsv">' + G.year + '/' + (G.year+1).toString().slice(2) + '</div></div>' +
      '<div class="hs"><div class="hsl">Date</div><div class="hsv">' + fmtDate(G.day) + '</div></div>' +
      '<div class="hs"><div class="hsl">PL pos</div><div class="hsv">' + ordinal(munPos) + '</div></div>' +
      '<div class="hs"><div class="hsl">Budget</div><div class="hsv">£' + G.budget + 'm</div></div>' +
      '<div class="hs"><div class="hsl">Trophies</div><div class="hsv">' + G.trophies.length + '</div></div>' +
      '<div class="hs"><div class="hsl">Next</div><div class="hsv">' + (next ? next.oppShort : '—') + '</div></div>' +
    '</div>';
    const tabList = [['dash','Dashboard'],['squad','Squad'],['transfers','Transfers'],['scouting','Scouting'],['tables','Tables'],['training','Training']];
    const tabs = tabList.map(t => '<button class="tab ' + (G.view===t[0]?'active':'') + '" onclick="setView(\'' + t[0] + '\')">' + t[1] + '</button>').join('');
    const tabBar = G.view === 'match' || G.view === 'season-end' ? '' : '<div class="tabs">' + tabs + '</div>';
    let body = '';
    try {
      if (G.view === 'dash') body = renderDash();
      else if (G.view === 'match') body = renderMatch();
      else if (G.view === 'squad') body = renderSquadHub();
      else if (G.view === 'transfers') body = renderTransfers();
      else if (G.view === 'scouting') body = renderScouting();
      else if (G.view === 'tables') body = renderTables();
      else if (G.view === 'training') body = renderTraining();
      else if (G.view === 'season-end') body = renderSeasonEnd();
    } catch (err) {
      console.error(err);
      body = '<div class="pnl" style="border:1px solid var(--color-border-info);"><div class="pnl-t">Render issue</div><div style="font-size:12px; color:var(--color-text-secondary);">The game recovered from a display error. Try another tab or reload if it continues.</div></div>';
    }
    root.innerHTML = header + tabBar + body;
  }

  function renderDash() {
    const upcoming = G.fixtures.filter(f => !f.played).slice(0, 5);
    const recent = G.results.slice(-4).reverse();
    const msgs = G.transferMessages.slice(-3).reverse();
    const injuries = G.squad.filter(p => p.injuryWeeks > 0 && !p.sold);
    const inForm = G.squad.filter(p => isInForm(p) && !p.sold);
    const next = nextFixture();
    return msgs.map(m => '<div class="toast">' + m + '</div>').join('') +
      '<div class="grid2"><div><div class="pnl-t">Upcoming fixtures</div>' +
      '<div class="pnl" style="padding:4px 0;">' + (upcoming.length ? upcoming.map(f => '<div class="fix">' +
        '<div class="fix-date">' + fmtDate(f.day) + '</div><div class="cmp cmp-' + f.comp + '">' + f.comp + (f.round?' '+f.round:'') + '</div>' +
        '<div>' + (f.home ? 'vs' : 'at') + ' ' + f.opp + '</div><div style="text-align:right; color:var(--color-text-secondary);">OVR ' + f.oppStr + '</div></div>').join('') : '<div style="padding:10px; color:var(--color-text-secondary);">No fixtures.</div>') + '</div></div>' +
      '<div><div class="pnl-t">Recent results</div><div class="pnl" style="padding:4px 0;">' + (recent.length ? recent.map(r => {
        const win = r.munGoals > r.oppGoals, drew = r.munGoals === r.oppGoals;
        const col = win ? 'var(--color-text-success)' : drew ? 'var(--color-text-warning)' : 'var(--color-text-danger)';
        return '<div class="fix"><div class="fix-date">' + fmtDate(r.day) + '</div><div class="cmp cmp-' + r.comp + '">' + r.comp + '</div>' +
          '<div>' + (r.home ? 'vs' : 'at') + ' ' + r.opp + '</div><div style="text-align:right; font-weight:500; color:' + col + ';">' + r.munGoals + '-' + r.oppGoals + '</div></div>';
      }).join('') : '<div style="padding:10px; color:var(--color-text-secondary);">No matches played.</div>') + '</div></div></div>' +
      '<div class="grid2"><div class="pnl"><div class="pnl-t">Injury list (' + injuries.length + ')</div>' + (injuries.length ? injuries.map(p => '<div style="display:flex; justify-content:space-between; padding:4px 0; font-size:12px;"><span>' + p.name + ' (' + p.pos + ')</span><span style="color:var(--color-text-danger);">' + Math.ceil(p.injuryWeeks) + 'w</span></div>').join('') : '<div style="color:var(--color-text-secondary); font-size:12px;">Everyone fit.</div>') + '</div>' +
      '<div class="pnl"><div class="pnl-t">Elite form (' + inForm.length + ')</div>' + (inForm.length ? inForm.map(p => '<div style="display:flex; justify-content:space-between; padding:4px 0; font-size:12px;"><span>' + p.name + ' (' + p.pos + ')</span><span style="color:var(--color-text-success);">avg ' + (p.matchRatings.slice(-5).reduce((a,b)=>a+b,0)/Math.min(5,p.matchRatings.length)).toFixed(1) + '</span></div>').join('') : '<div style="color:var(--color-text-secondary); font-size:12px;">No one hot.</div>') + '</div></div>' +
      (G.trophies.length ? '<div class="pnl"><div class="pnl-t">Trophy cabinet</div>' + G.trophies.map(t=>'<span class="trophy">' + t + '</span>').join('') + '</div>' : '') +
      '<button class="play-btn" onclick="advance()">' + (next ? 'Advance to ' + fmtDate(next.day) + ' · ' + next.comp + (next.round?' '+next.round:'') + ' ' + (next.home?'vs':'at') + ' ' + next.opp : 'End season') + '</button>';
  }

  function renderMatch() {
    if (!G.currentMatch) return '<div>No match.</div>';
    const cm = G.currentMatch, fx = cm.fx;
    const postMatch = cm.done && cm.matchRatings ? '<div class="pnl"><div class="pnl-t">Match ratings</div>' +
      getXI().sort((a,b) => (cm.matchRatings[b.id]||0) - (cm.matchRatings[a.id]||0)).map(p => {
        const mr = cm.matchRatings[p.id];
        const col = mr >= 8 ? '#3B6D11' : mr >= 7 ? '#173404' : mr >= 6 ? '#854F0B' : '#A32D2D';
        return '<div style="display:grid; grid-template-columns: 14px 1fr 32px 50px 60px; gap:6px; padding:3px 6px; font-size:11px; align-items:center;">' +
          '<span><span class="pos pos-' + p.pos + '">' + p.pos[0] + '</span></span><span>' + p.name + '</span>' +
          '<span>' + ((cm.perPlayerGoals[p.id]||0) > 0 ? '⚽' + cm.perPlayerGoals[p.id] : '') + '</span>' +
          '<span style="color:var(--color-text-secondary);">' + ((cm.perPlayerAssists[p.id]||0) > 0 ? 'assist ' + cm.perPlayerAssists[p.id] : '') + '</span>' +
          '<span style="font-weight:500; color:' + col + ';">' + mr.toFixed(1) + '</span></div>';
      }).join('') + '</div>' : '';
    return '<div style="display:flex; align-items:center; justify-content:space-between; margin-bottom:8px;">' +
      '<div><div class="cmp cmp-' + fx.comp + '" style="display:inline-block;">' + fx.comp + (fx.round?' · '+fx.round:'') + '</div>' +
      '<span style="margin-left:8px; color:var(--color-text-secondary); font-size:12px;">' + fmtDateLong(G.day) + ' · ' + (fx.home?'Home':'Away') + ' · weight ' + matchWeight(fx).toFixed(1) + 'x</span></div></div>' +
      '<div class="scoreboard">' +
        '<div><div style="font-size:11px; color:var(--color-text-secondary);">Man Utd</div><div style="font-size:30px; font-weight:500;">' + cm.home + '</div></div>' +
        '<div style="font-size:11px; color:var(--color-text-tertiary); text-transform:uppercase; letter-spacing:0.08em;">' + (cm.playing?'Live':'Full time') + '</div>' +
        '<div style="text-align:right;"><div style="font-size:11px; color:var(--color-text-secondary);">' + fx.opp + '</div><div style="font-size:30px; font-weight:500;">' + cm.away + '</div></div>' +
      '</div>' +
      '<div class="pnl"><div class="pnl-t">Commentary</div><div class="comm" id="comm-log">' +
        cm.comm.map(c => '<div class="comm-l ' + c.t + '"><span class="min">' + (typeof c.m==='number'?c.m+"'":c.m) + '</span>' + c.text + '</div>').join('') +
      '</div></div>' + postMatch +
      (cm.done ? '<button class="play-btn" onclick="closeMatch()">Continue</button>' : '<div style="padding: 8px; color:var(--color-text-secondary); text-align:center; font-size:12px;">Match in progress…</div>');
  }

  function renderSquadHub() {
    const xi = getXI();
    const fwd = xi.filter(p => p.pos==='FWD'), mid = xi.filter(p => p.pos==='MID'), def = xi.filter(p => p.pos==='DEF'), gk = xi.filter(p => p.pos==='GK');
    const tok = (p) => {
      const eff = ROUND(effectiveRating(p));
      const lastName = p.name.split(' ').pop().slice(0,8);
      return '<div class="ptok" title="' + p.name + ' · OVR ' + eff + '"><div>' + lastName + '</div><div class="ptok-rating">' + eff + '</div>' + (isInForm(p)?'<div class="ptok-mark">★</div>':'') + '</div>';
    };
    const slots = getFormationSlots(G.formation);
    const positionLabels = { GK: ['Goalkeepers', slots[0]], DEF: ['Defenders', slots[1]], MID: ['Midfielders', slots[2]], FWD: ['Forwards', slots[3]] };
    return '<div class="pnl">' +
      '<div style="display:flex; gap:6px; flex-wrap:wrap; align-items:center;">' +
        '<span style="font-size:10px; color:var(--color-text-secondary); text-transform:uppercase; letter-spacing:0.05em;">Formation</span>' +
        ['4-3-3','4-2-3-1','4-4-2','3-5-2','5-3-2'].map(f => '<button class="btn ' + (G.formation===f?'pri':'') + '" onclick="setFormation(\'' + f + '\')">' + f + '</button>').join('') +
        '<span style="font-size:10px; color:var(--color-text-secondary); text-transform:uppercase; letter-spacing:0.05em; margin-left: 8px;">Mentality</span>' +
        ['attack','balanced','defensive'].map(t => '<button class="btn ' + (G.tactic===t?'pri':'') + '" onclick="setTactic(\'' + t + '\')">' + (t[0].toUpperCase()+t.slice(1)) + '</button>').join('') +
      '</div>' +
      '<div style="display:flex; gap:6px; margin-top:8px;">' +
        '<button class="btn pri" onclick="autoPickXIAndRender()">Best XI</button>' +
        '<button class="btn" onclick="setFreshestXI()">Freshest XI</button>' +
      '</div></div>' +
      '<div class="pnl" style="padding: 6px;"><div class="pitch">' +
        '<div class="pitch-row">' + fwd.map(tok).join('') + '</div>' +
        '<div class="pitch-row">' + mid.map(tok).join('') + '</div>' +
        '<div class="pitch-row">' + def.map(tok).join('') + '</div>' +
        '<div class="pitch-row">' + gk.map(tok).join('') + '</div>' +
      '</div></div>' +
      '<div class="toast">Click <strong>Start</strong> next to any player to put them in the XI. Click <strong>Bench</strong> to drop a starter. Injured players are unavailable.</div>' +
      ['GK','DEF','MID','FWD'].map(pos => {
        const label = positionLabels[pos][0], count = positionLabels[pos][1];
        const players = G.squad.filter(p => !p.sold && p.pos === pos).sort((a,b) => effectiveRating(b) - effectiveRating(a));
        const startersCount = players.filter(p => G.starters.includes(p.id)).length;
        return '<div class="pnl" style="padding: 6px 8px;">' +
          '<div class="lineup-head">' + label + ' · ' + startersCount + ' of ' + count + ' in XI · ' + players.length + ' in squad</div>' +
          '<div class="lineup-row lineup-head" style="background:transparent; padding:2px 6px;">' +
            '<span></span><span>Player</span><span>Pos</span><span>OVR (eff)</span><span>Form</span><span>Role</span><span>Fit</span><span>Mor</span><span>Action</span><span></span>' +
          '</div>' +
          players.map(p => renderLineupRow(p)).join('') +
        '</div>';
      }).join('');
  }

  function renderLineupRow(p) {
    const isStarter = G.starters.includes(p.id);
    const eff = ROUND(effectiveRating(p));
    const bonus = formBonus(p);
    const moraleCol = p.morale >= 75 ? '#97C459' : p.morale >= 50 ? '#FAC775' : '#F09595';
    const fitCol = p.fitness >= 75 ? '#97C459' : p.fitness >= 50 ? '#FAC775' : '#F09595';
    const injured = p.injuryWeeks > 0;
    const form = getFormStatus(p);
    const role = getSquadRole(p);
    const dot = isStarter ? '<span style="color:#DA291C; font-size:14px;">●</span>' : '<span style="color:var(--color-border-tertiary); font-size:14px;">○</span>';
    const tier = tierOf(p.ovr);
    const recent = p.matchRatings.slice(-3);
    const recentChips = recent.map(r => {
      const col = r >= 8 ? '#97C459' : r >= 7 ? '#C0DD97' : r >= 6.5 ? '#D3D1C7' : '#F09595';
      const txt = r >= 6.5 ? '#173404' : '#501313';
      return '<span class="rating-chip" style="background:' + col + '; color:' + txt + ';">' + r.toFixed(1) + '</span>';
    }).join('');
    return '<div class="lineup-row ' + (isStarter ? 'is-starter' : '') + '">' +
      '<span>' + dot + '</span>' +
      '<span style="overflow:hidden; text-overflow:ellipsis; white-space:nowrap;">' +
        p.name + ' <span style="color:var(--color-text-tertiary); font-size:10px;">' + p.age + '</span>' +
        (injured ? '<span class="badge inj">INJ ' + Math.ceil(p.injuryWeeks) + 'w</span>' : '') +
        (p.newSigning ? '<span class="badge new">NEW</span>' : '') +
        '<span style="display:block; font-size:10px; color:var(--color-text-tertiary); margin-top:1px;">' + (recentChips || '<span style="opacity:0.5;">no matches yet</span>') + '</span>' +
      '</span>' +
      '<span><span class="pos pos-' + p.pos + '">' + p.pos + '</span></span>' +
      '<span><span class="ovr ' + tier + '">' + eff + '</span>' + (bonus!==0?' <span style="font-size:9px; color:' + (bonus>0?'#3B6D11':'#A32D2D') + ';">' + (bonus>0?'+':'') + bonus + '</span>':'') + '</span>' +
      '<span><span class="form-tag form-' + form + '">' + form + '</span></span>' +
      '<span><span class="role-tag">' + role + '</span></span>' +
      '<span><span class="mor-bar"><span class="mor-fill" style="width:' + p.fitness + '%; background:' + fitCol + ';"></span></span></span>' +
      '<span><span class="mor-bar"><span class="mor-fill" style="width:' + p.morale + '%; background:' + moraleCol + ';"></span></span></span>' +
      '<span>' + (injured ? '<span style="font-size:10px; color:var(--color-text-tertiary);">Unavailable</span>'
        : isStarter ? '<button class="btn sm" onclick="benchPlayer(' + p.id + ')" style="width: 70px;">Bench →</button>'
        : '<button class="btn sm pri" onclick="startPlayer(' + p.id + ')" style="width: 70px;">→ Start</button>') + '</span>' +
      '<span><button class="btn sm" onclick="sellPlayer(' + p.id + ')" title="Transfer list">£</button></span>' +
    '</div>';
  }

  function renderTransfers() {
    const available = G.market.filter(p => p.status === 'available').sort((a,b) => {
      const aS = G.shortlist.includes(a.id) ? 1 : 0;
      const bS = G.shortlist.includes(b.id) ? 1 : 0;
      return bS - aS || b.ovr - a.ovr;
    });
    return (!G.windowOpen ? '<div class="toast">Transfer window closed.</div>' : '') +
      (G.shortlist.length ? '<div class="toast">Shortlist: ' + G.shortlist.length + ' player' + (G.shortlist.length>1?'s':'') + ' tracked.</div>' : '') +
      '<div class="pnl"><div class="pnl-t">Available targets · Budget £' + G.budget + 'm · ' + available.length + ' players</div>' +
        '<div class="market-row head"><span>Player</span><span>Club</span><span>Age</span><span>Pos</span><span>OVR · POT</span><span>Price</span><span></span></div>' +
        available.slice(0, 60).map(p => '<div class="market-row" style="' + (G.shortlist.includes(p.id)?'background: rgba(251,225,34,0.08);':'') + '">' +
          '<span>' + (G.shortlist.includes(p.id)?'<span style="color:#BA7517;">★</span> ':'') + p.name + '</span>' +
          '<span style="color:var(--color-text-secondary);">' + p.club + '</span><span>' + p.age + '</span>' +
          '<span><span class="pos pos-' + p.pos + '">' + p.pos + '</span></span>' +
          '<span><span class="ovr ' + tierOf(p.ovr) + '">' + p.ovr + '</span> <span style="color:var(--color-text-secondary);">' + p.pot + '</span></span>' +
          '<span>£' + p.price + 'm</span>' +
          '<span style="display:flex; gap:3px;">' +
            '<button class="btn sm" onclick="toggleShortlist(' + p.id + ')">' + (G.shortlist.includes(p.id)?'★':'☆') + '</button>' +
            '<button class="btn sm ' + (G.budget>=p.price?'pri':'') + '" onclick="bidForPlayer(' + p.id + ')" ' + (!G.windowOpen?'disabled':'') + '>Bid</button>' +
          '</span></div>').join('') +
      '</div>';
  }

  function renderScouting() {
    const recs = scoutRecommendations();
    return '<div class="pnl"><div class="pnl-t">Chief scout\'s report</div>' +
      '<p style="font-size:12px; color:var(--color-text-secondary); margin: 0 0 8px;">Targets identified for our positions of need.</p></div>' +
      recs.map(p => '<div class="scout-card"><div class="scout-row">' +
        '<div><div style="font-weight:500; font-size:13px;">' + p.name + ' <span class="pos pos-' + p.pos + '" style="margin-left:6px;">' + p.pos + '</span> <span style="color:var(--color-text-secondary); font-size:11px; margin-left:6px;">' + p.club + ' · ' + p.age + 'yo</span></div>' +
        '<div style="font-size:11px; color:var(--color-text-secondary); margin-top:3px;">' + scoutReport(p) + '</div></div>' +
        '<div style="text-align:right;"><div><span class="ovr ' + tierOf(p.ovr) + '">' + p.ovr + '</span> <span style="color:var(--color-text-secondary); font-size:11px;">→ ' + p.pot + '</span></div>' +
        '<div style="font-size:11px; margin-top:3px;">£' + p.price + 'm</div></div></div>' +
        '<div style="display:flex; gap:6px; margin-top:8px;">' +
          '<button class="btn sm" onclick="toggleShortlist(' + p.id + ')">' + (G.shortlist.includes(p.id)?'★ Shortlisted':'☆ Shortlist') + '</button>' +
          '<button class="btn sm ' + (G.budget>=p.price && G.windowOpen?'pri':'') + '" onclick="bidForPlayer(' + p.id + ')" ' + ((!G.windowOpen||G.budget<p.price)?'disabled':'') + '>Bid £' + p.price + 'm</button>' +
        '</div></div>').join('');
  }

  function renderTables() {
    const pl = leagueSorted();
    const cl = Object.entries(G.clStandings).map(([n,s]) => ({name:n, ...s, GD: s.GF-s.GA})).sort((a,b)=>b.Pts-a.Pts||b.GD-a.GD);
    return '<div class="grid2">' +
      '<div class="pnl"><div class="pnl-t">Premier League</div>' +
        '<div class="table-row head"><span>#</span><span>Team</span><span>P</span><span>W</span><span>D</span><span>L</span><span>GD</span><span>Pts</span></div>' +
        pl.map((t,i) => '<div class="table-row ' + (t.name==='Man Utd'?'mun':i<5?'cl-spot':'') + '"><span>' + (i+1) + '</span><span>' + t.name + '</span><span>' + t.P + '</span><span>' + t.W + '</span><span>' + t.D + '</span><span>' + t.L + '</span><span>' + (t.GD>0?'+':'') + t.GD + '</span><span>' + t.Pts + '</span></div>').join('') +
      '</div>' +
      '<div>' +
        '<div class="pnl"><div class="pnl-t">Champions League · league phase</div>' +
          '<div class="table-row head"><span>#</span><span>Team</span><span>P</span><span>W</span><span>D</span><span>L</span><span>GD</span><span>Pts</span></div>' +
          cl.slice(0,8).map((t,i) => '<div class="table-row ' + (t.name==='Man Utd'?'mun':'') + '"><span>' + (i+1) + '</span><span>' + t.name + '</span><span>' + t.P + '</span><span>' + t.W + '</span><span>' + t.D + '</span><span>' + t.L + '</span><span>' + (t.GD>0?'+':'') + t.GD + '</span><span>' + t.Pts + '</span></div>').join('') +
        '</div>' +
        '<div class="pnl"><div class="pnl-t">FA Cup run</div>' +
          (G.cupRounds.FA.length ? G.cupRounds.FA.map(r => '<div class="fix"><div class="fix-date">' + r.round + '</div><div></div><div>vs ' + r.opp + '</div><div style="text-align:right; font-weight:500; color:' + (r.won?'var(--color-text-success)':'var(--color-text-danger)') + ';">' + r.score + '</div></div>').join('') : '<div style="padding:6px; color:var(--color-text-secondary);">Not entered yet.</div>') +
        '</div>' +
        '<div class="pnl"><div class="pnl-t">EFL Cup run</div>' +
          (G.cupRounds.EFL.length ? G.cupRounds.EFL.map(r => '<div class="fix"><div class="fix-date">' + r.round + '</div><div></div><div>vs ' + r.opp + '</div><div style="text-align:right; font-weight:500; color:' + (r.won?'var(--color-text-success)':'var(--color-text-danger)') + ';">' + r.score + '</div></div>').join('') : '<div style="padding:6px; color:var(--color-text-secondary);">Not entered yet.</div>') +
        '</div>' +
      '</div></div>';
  }

  function renderTraining() {
    return '<div class="pnl"><div class="pnl-t">Training focus</div>' +
      '<p style="font-size:12px; color:var(--color-text-secondary); margin:0 0 8px;">Tilt end-of-season rating updates.</p>' +
      '<div style="display:flex; gap:6px; flex-wrap:wrap;">' +
        [['youth','Youth development'],['balanced','Balanced'],['fitness','Fitness']].map(t => '<button class="btn ' + (G.training===t[0]?'pri':'') + '" onclick="setTraining(\'' + t[0] + '\')">' + t[1] + '</button>').join('') +
      '</div></div>' +
      '<div class="pnl"><div class="pnl-t">Top performers · current season</div>' +
      G.squad.filter(p => !p.sold && p.matchRatings.length > 0).sort((a,b) => {
        const aA = a.matchRatings.reduce((s,r)=>s+r,0)/a.matchRatings.length;
        const bA = b.matchRatings.reduce((s,r)=>s+r,0)/b.matchRatings.length;
        return bA - aA;
      }).slice(0, 12).map(p => {
        const avg = p.matchRatings.reduce((s,r)=>s+r,0)/p.matchRatings.length;
        const bigAvg = p.bigGameRatings.length ? p.bigGameRatings.reduce((s,r)=>s+r,0)/p.bigGameRatings.length : null;
        return '<div style="display:grid; grid-template-columns: 32px 1fr 32px 60px 80px 80px; gap:6px; padding:5px 6px; font-size:11px; align-items:center; border-bottom: 0.5px solid var(--color-border-tertiary);">' +
          '<span><span class="pos pos-' + p.pos + '">' + p.pos + '</span></span><span>' + p.name + '</span><span>' + p.age + '</span>' +
          '<span><span class="ovr ' + tierOf(p.ovr) + '">' + p.ovr + '</span></span>' +
          '<span style="color:var(--color-text-secondary);">avg ' + avg.toFixed(2) + '</span>' +
          '<span style="color:var(--color-text-secondary);">' + (bigAvg ? 'big ' + bigAvg.toFixed(2) : '—') + '</span></div>';
      }).join('') + '</div>';
  }

  function renderSeasonEnd() {
    const stats = G.seasonStats;
    return '<div style="text-align:center; padding: 1rem 0;">' +
      '<h2 style="margin:0 0 8px;">' + (G.year-1) + '/' + G.year.toString().slice(2) + ' season complete</h2>' +
      '<p style="color:var(--color-text-secondary); margin:0 0 1rem;">' + stats.played + ' games · ' + stats.won + 'W ' + stats.drawn + 'D ' + stats.lost + 'L · ' + stats.gf + ':' + stats.ga + '</p>' +
      (G.trophies.length ? '<div style="margin-bottom:1rem;">' + G.trophies.map(t=>'<span class="trophy">' + t + '</span>').join('') + '</div>' : '') +
      '<p style="color:var(--color-text-secondary); margin:0 0 1rem;">Ratings recalculated from season-long impact. Veterans regressed; new transfers shed prove-it discount.</p>' +
      '<button class="play-btn" style="max-width:280px; margin: 0 auto; display:block;" onclick="startNextSeason()">Begin ' + G.year + '/' + (G.year+1).toString().slice(2) + ' season</button>' +
    '</div>';
  }

  function startNextSeason() { G.view = 'dash'; render(); }
  function ordinal(n) { if (!n || n < 1) return '—'; const s=['th','st','nd','rd'], v=n%100; return n+(s[(v-20)%10]||s[v]||s[0]); }
  function setView(v) { G.view = v; render(); }
  function setTactic(t) { G.tactic = t; render(); }
  function setFormation(f) { G.formation = f; autoPickXI(); render(); }
  function setTraining(t) { G.training = t; render(); }
  function autoPickXIAndRender() { autoPickXI(); render(); }

  newGame();
</script>
</body>
</html>
