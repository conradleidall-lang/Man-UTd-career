      --color-background-tertiary: #2c2c28;
      --color-background-info: #042c53;
      --color-background-danger: #501313;
      --color-background-success: #173404;
      --color-background-warning: #412402;
      --color-text-primary: #f1efe8;
      --color-text-secondary: #b4b2a9;
      --color-text-tertiary: #888780;

  .hsl { font-size: 10px; color: var(--color-text-tertiary); text-transform: uppercase; letter-spacing: 0.05em; }

  .tab.active { color: var(--color-text-primary); border-bottom-color: #DA291C; font-weight: 500; }

  .play-btn:hover { background: #B81E12; }
  .play-btn:disabled { opacity: 0.6; cursor: not-allowed; }
  .btn { padding: 5px 10px; background: transparent; border: 0.5px solid var(--color-border-secondary); border-radius: var(--border-radius-md); cursor: pointer; font-size: 11px; color: var(--color-text-primary); font-family: var(--font-sans); }
  .btn:hover { background: var(--color-background-secondary); }
  .btn:disabled { opacity: 0.5; cursor: not-allowed; }
  .btn.pri { background: #DA291C; color: #fff; border: none; }
  .btn.pri:hover { background: #B81E12; }
  .btn.sm { padding: 3px 7px; font-size: 10px; }
  .fix { display: grid; grid-template-columns: 70px 36px 1fr 70px; gap: 10px; align-items: center; padding: 7px 10px; border-bottom: 0.5px solid var(--color-border-tertiary); font-size: 12px; }
  .fix:last-child { border: none; }
  .fix-date { color: var(--color-text-tertiary); font-size: 11px; font-variant-numeric: tabular-nums; }
  .cmp { padding: 2px 6px; border-radius: 4px; font-size: 9px; font-weight: 500; text-transform: uppercase; letter-spacing: 0.04em; text-align: center; color: #fff; }
  .cmp-PL { background: #38003c; }
  .cmp-CL { background: #00266F; }
  .cmp-EL { background: #f15a24; }
  .cmp-FA { background: #003B7B; }
  .cmp-EFL { background: #003366; }
  .cmp-CS { background: #856404; }
  .cmp-FR { background: #5f5e5a; }
  .pnl { background: var(--color-background-secondary); padding: 10px 12px; border-radius: var(--border-radius-md); margin-bottom: 8px; }
  .pnl-t { font-size: 10px; color: var(--color-text-secondary); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 6px; }

  .ovr.solid { background: #C0DD97; color: #173404; }
  .ovr.depth { background: #D3D1C7; color: #2C2C2A; }
  .pos { padding: 1px 5px; border-radius: 3px; font-size: 9px; font-weight: 500; text-align: center; display: inline-block; }

  function updatePLTable(fx, mg, og) {

  function clTeamInfo(name) {

  function simGoals(aStr, bStr, home) {

  function resolveElimination(aName, bName, aStr, bStr, aGoals, bGoals) {
    const res = { aGoals, bGoals, extra:false, pens:false, aPens:null, bPens:null, winner:null, note:'' };
    if (aGoals !== bGoals) {
      res.winner = aGoals > bGoals ? aName : bName;
      return res;
    }
    res.extra = true;
    const aET = Math.random() < Math.max(0.12, 0.27 + (aStr - bStr) / 120);
    const bET = Math.random() < Math.max(0.12, 0.27 + (bStr - aStr) / 120);
    res.aGoals += aET ? 1 : 0;
    res.bGoals += bET ? 1 : 0;
    if (res.aGoals !== res.bGoals) {
      res.winner = res.aGoals > res.bGoals ? aName : bName;
      res.note = 'AET';
      return res;
    }
    res.pens = true;
    const aBase = 3 + Math.floor(Math.random()*3), bBase = 3 + Math.floor(Math.random()*3);
    res.aPens = aBase; res.bPens = bBase;
    while (res.aPens === res.bPens) {

    res.winner = res.aPens > res.bPens ? aName : bName;
    res.note = 'pens ' + res.aPens + '-' + res.bPens;

  function simEuropaLeague() {

      const teams = [...G.elTeams].sort(()=>Math.random()-0.5);
      for (let i=0; i+1<teams.length; i+=2) {
        const a = teams[i], b = teams[i+1];

    while (ties.length) {

  function simCLTie(tie) {

  function scheduleNextCupRound(fx) {
    const nextRounds = fx.comp === 'FA' ? ['R3','R4','R5','QF','SF','Final'] : ['R3','R4','QF','SF','Final'];
    const idx = nextRounds.indexOf(fx.round);
    if (idx < 0 || idx + 1 >= nextRounds.length) return;
    const next = nextRounds[idx + 1];
    const oppPool = next === 'Final' || next === 'SF' ? PL_TEAMS.slice(0,8) : [...PL_TEAMS, ['Coventry','COV',68],['QPR','QPR',66]];
    const opp = PICK(oppPool);
    G.fixtures.push({ id: G.fixtures.length, day: fx.day + 28, comp: fx.comp, opp: opp[0], oppShort: opp[1], oppStr: opp[2], home: Math.random()<0.5, played:false, round: next });
    G.fixtures.sort((a,b) => a.day - b.day);
  }

  function closeMatch() {
    const cm = G.currentMatch;
    if (cm && (cm.fx.comp === 'FA' || cm.fx.comp === 'EFL') && cm.fx.round === 'Final' && cm.fx.won) {
      awardTrophy(seasonLabel() + ' ' + (cm.fx.comp === 'FA' ? 'FA Cup' : 'EFL Cup'));
    }
    G.day = cm ? cm.fx.day + 1 : G.day + 1;
    G.currentMatch = null;
    refreshTransferWindow();
    maybeGenerateIncomingBid();
    maybeRunAITransfers();
    if (G.day > 510 + (G.season-1)*365 && !G.fixtures.some(f => !f.played)) endSeason();
    else G.view = 'dash';
    render();
  }

  function endSeason() {
    const munPos = leagueSorted().findIndex(t => t.name==='Man Utd') + 1;
    const trophiesBefore = G.trophies.length;
    if (munPos === 1) {
      awardTrophy(seasonLabel() + ' Premier League');
      G.transferMessages.push('Premier League champions — title added to the trophy cabinet.');
    }
    const clWinner = (G.clKnockout && G.clKnockout.champion) || PICK([...EURO_TEAMS, ...CL_EXTRA_TEAMS])[0];
    const plCLWinner = ['Man Utd', ...PL_TEAMS.map(t=>t[0])].includes(clWinner);
    G.nextCLQualified = munPos <= 4 || (munPos === 5 && plCLWinner);
    G.transferMessages.push(G.nextCLQualified ? 'Champions League qualification secured for next season.' : 'Missed Champions League qualification — finish top 4 next year to return.');
    saveSeasonHistory(munPos, trophiesBefore);
    updatePlayerRatings(true);
    G.loanReturnLog = [];
    const loanInjuries = {};
    G.squad.forEach(p => {
      if (p.sold) return;
      if (p.onLoan) {
        const entry = resolveLoanReturn(p);
        if (entry) {
          G.loanReturnLog.push(entry);
          if (entry.injuryWeeks) loanInjuries[p.id] = entry.injuryWeeks;
        }
      }
      p.age++;
      p.mins = 0; p.goals = 0; p.assists = 0; p.appearances = 0;
      p.matchRatings = []; p.bigGameRatings = [];
      const stadiumMoraleBoost = (G.stadiumLevel - 1) * 2;
      const fanbaseMoraleBoost = Math.floor(Math.max(0, G.fanbase - 70) * 0.15);
      const cEnd = getCultureMods();
      const cultureMoraleBoost = (cEnd.artisanPenalty && (p.pos === 'FWD' || p.pos === 'MID') ? 3 : 0) + (cEnd.moraleEnd || 0);
      p.fitness = 100; p.morale = Math.min(100, Math.max(60, p.morale) + stadiumMoraleBoost + fanbaseMoraleBoost + cultureMoraleBoost);
      p.injuryWeeks = 0; p.onLoan = null; p.suspended = 0; p.academyTeam = null;
      if (p.age >= 38 && p.ovr < 65) p.sold = true;
    });
    Object.entries(loanInjuries).forEach(([id, wks]) => {
      const p = G.squad.find(x => x.id === +id);
      if (p) p.injuryWeeks = wks;
    });
    ['u21','u18'].forEach(team => academyPlayers(team).forEach(p => p.age++));
    G.season++; G.year++;
    G.clQualified = G.nextCLQualified;
    G.day = 198 + (G.season-1)*365;
    G.seasonStats = { played:0, won:0, drawn:0, lost:0, gf:0, ga:0 };
    G.results = []; G.fixtures = []; G.cupRounds = { FA: [], EFL: [] };
    const endMods = getCultureMods();
    const trophyMult = endMods.aristocratBoard ? 1.3 : 1;
    const noTrophyDecay = endMods.artisanPenalty ? -1 : -0.5;
    const fanbaseGain = G.lastSeasonTrophyValue > 0 ? G.lastSeasonTrophyValue * trophyMult : noTrophyDecay;
    G.fanbase = Math.max(65, Math.min(100, (G.fanbase || 70) + fanbaseGain));
    G.lastSeasonTrophyValue = 0;
    const stadiumRevenue = 15 + G.stadiumLevel * 6;
    const fanbaseRevenue = Math.floor(Math.max(0, G.fanbase - 70) * 0.9 * (endMods.fanbaseMult || 1));
    const plPrizeMoney = Math.max(5, Math.round(45 - (munPos - 1) * 2.1));
    G.budget += stadiumRevenue + fanbaseRevenue + plPrizeMoney;
    const fanLabel = fanbaseLabel(G.fanbase);
    G.transferMessages.push('Stadium (Level ' + G.stadiumLevel + ') generated £' + stadiumRevenue + 'm. Fanbase (' + fanLabel + ') added £' + fanbaseRevenue + 'm.');
    G.transferMessages.push('Premier League prize money · ' + ordinal(munPos) + ' place · £' + plPrizeMoney + 'm added to budget.');
    G.pairStats = {}; G.activeDuos = [];
    G.windowOpen = true; G.incomingBids = []; G.aiTransfers = {}; G.aiTransferLog = [];
    G.view = 'season-end';
    refreshTransferWindow(); initTables(); buildFixtures(); autoPickXI(); render();
  }

  function saveSeasonHistory(munPos, trophiesBefore) {
    if (G.seasonHistory.some(s => s.season === G.season)) return;
    const label = G.year + '/' + (G.year+1).toString().slice(2);
    const players = G.squad.filter(p => !p.sold || p.appearances > 0 || p.goals > 0 || p.assists > 0).map(p => ({
      name:p.name, pos:p.pos, role:roleOf(p), age:p.age, ovr:p.ovr, goals:p.goals, assists:p.assists,
      ga:p.goals + p.assists, apps:p.appearances, mins:p.mins,
      clubGoals:p.clubGoals || 0, clubAssists:p.clubAssists || 0, clubApps:p.clubApps || 0
    })).sort((a,b) => b.ga - a.ga || b.goals - a.goals || b.assists - a.assists || b.apps - a.apps);
    const stats = Object.assign({}, G.seasonStats);
    const topScorer = [...players].sort((a,b) => b.goals - a.goals || b.assists - a.assists)[0] || null;
    const topCreator = [...players].sort((a,b) => b.assists - a.assists || b.goals - a.goals)[0] || null;
    G.seasonHistory.push({
      season:G.season, label, year:G.year, leaguePos:munPos, stats,
      trophies:G.trophies.slice(trophiesBefore), totalTrophies:G.trophies.length,
      topScorer, topCreator, players
    });
    updateClubRecords(label, players);
  }
  function ensureRecords() {
    if (!G.records) G.records = {};
    return G.records;
  }
  function setRecord(key, title, player, value, label) {
    if (!player || value <= 0) return;
    const records = ensureRecords();
    if (!records[key] || value > records[key].value) {
      records[key] = { title, player:player.name, value, year:label };

  }
  function updateClubRecords(label, players) {
    players.forEach(p => {
      setRecord('seasonGoals', 'Most goals in a season', p, p.goals, label);
      setRecord('seasonAssists', 'Most assists in a season', p, p.assists, label);
      setRecord('seasonGA', 'Most G+A in a season', p, p.goals + p.assists, label);
    });
    G.squad.forEach(p => {
      setRecord('clubGoals', 'All-time club goals', p, p.clubGoals || 0, label);
      setRecord('clubAssists', 'All-time club assists', p, p.clubAssists || 0, label);
      setRecord('clubApps', 'All-time club appearances', p, p.clubApps || 0, label);

  function lineupIsValid() {
    const assignments = getFormationAssignments().flat();
    const gkSlot = assignments.find(a => a.slot === 'GK');
    const gkInGoal = gkSlot && gkSlot.player && roleOf(gkSlot.player) === 'GK';
    const gkOutfield = assignments.some(a => a.slot !== 'GK' && a.player && roleOf(a.player) === 'GK');
    return { ok: gkInGoal && !gkOutfield, gkOutfield, noGK: !gkInGoal };
  }

  function advance() {
    const fx = nextFixture();
    if (!fx) { endSeason(); return; }
    const daysBetween = Math.max(1, fx.day - G.day);
    simulateAcademyDays(daysBetween);
    G.squad.forEach(p => {
      p.fitness = Math.min(100, p.fitness + daysBetween * 8);
      if (p.injuryWeeks > 0) p.injuryWeeks = Math.max(0, p.injuryWeeks - daysBetween/7);
    });
    G.day = fx.day;
    G.trashTalks = (G.trashTalks || []).filter(t => t.expiresDay > G.day);
    maybeGenerateTrashTalk();
    refreshTransferWindow();
    const stillValid = G.starters.map(id => G.squad.find(p => p.id === id)).filter(p => p && isAvailable(p));
    if (stillValid.length < 11) autoPickXI();
    const check = lineupIsValid();
    if (!check.ok) {
      G.transferMessages.push(check.gkOutfield ? 'Invalid lineup — a goalkeeper is selected in an outfield position. Fix the squad tab before playing.' : 'Invalid lineup — no goalkeeper in goal. Fix the squad tab before playing.');
      G.view = 'dash'; render(); return;
    }
    playFixture(fx);
  }

  function leagueSorted() {
    return Object.entries(G.tables).map(([name,s]) => ({name, ...s, GD: s.GF - s.GA}))
      .sort((a,b) => b.Pts - a.Pts || b.GD - a.GD || b.GF - a.GF);
  }

  function bidForPlayer(id) {
    refreshTransferWindow();
    const target = G.market.find(p => p.id === id);
    if (!target || target.status !== 'available') return;
    if (!G.windowOpen) { G.transferMessages.push('Transfer window closed — you can only buy in June, July, August, or January.'); render(); return; }
    if (G.budget < target.price) { G.transferMessages.push('Bid for ' + target.name + ' rejected — over budget.'); render(); return; }
    const reputationBoost = Math.min(0.18, Math.max(0, (G.reputation - 78) * 0.014) + (G.stadiumLevel - 1) * 0.03);
    const eliteTax = target.ovr >= 89 && G.reputation < 84 ? -0.12 : 0;
    const cSignMod = getCultureMods();
    const foreignTax = target.foreign ? (-0.22 + (cSignMod.foreignPenalty || 0)) : 0;
    const chance = Math.min(0.95, (target.ovr >= 88 ? 0.45 : target.ovr >= 85 ? 0.65 : 0.85) + reputationBoost + eliteTax + foreignTax + (cSignMod.signingMod || 0));
    if (Math.random() < chance) {
      G.budget -= target.price;
      target.status = 'signed';
      removeFromClubRoster(target.club, target.name);
      const newId = Math.max(...G.squad.map(p=>p.id)) + 1;
      G.squad.push({ id:newId, name:target.name, pos:target.pos, role:roleOf(target), age:target.age, ovr:target.ovr, pot:target.pot,
        mins:0, goals:0, assists:0, appearances:0, clubGoals:0, clubAssists:0, clubApps:0, matchRatings: [], bigGameRatings: [], lastUpdate: G.day,
        fitness:100, morale:75, injuryWeeks:0, newSigning: true, sold:false, onLoan:null, suspended:0, majorInjuries:0, devPenalty:0, academyTeam:null });
      G.transferMessages.push('Signed ' + target.name + ' from ' + target.club + ' for £' + target.price + 'm.');
      autoPickXI();
    } else {
      if (target.ovr >= 84) {
        const counter = Math.round(target.price * 1.2);
        G.transferMessages.push(target.club + ' rejected our bid. They want £' + counter + 'm for ' + target.name + '.');
        target.price = counter;
      } else {
        G.transferMessages.push(target.club + ' rejected our bid for ' + target.name + '.');
      }
    }
    render();
  }
  function aiBuyerClubs() {
    return [...PL_TEAMS.map(t => t[0]), ...EURO_TEAMS.map(t => t[0])].filter(c => c !== 'Man Utd');
  }
  function aiClubTransferCount(club) { return G.aiTransfers[club] || 0; }
  function aiClubCanBuy(club) { return aiClubTransferCount(club) < 3; }
  function maybeRunAITransfers() {
    refreshTransferWindow();
    if (!G.windowOpen || Math.random() > 0.28) return;
    const clubs = aiBuyerClubs().filter(aiClubCanBuy);
    const available = G.market.filter(p => p.status === 'available' && p.club !== 'Man Utd');
    if (!clubs.length || !available.length) return;
    const buyer = PICK(clubs);
    const buyerStrength = (PL_TEAMS.find(t=>t[0]===buyer)?.[2] || EURO_TEAMS.find(t=>t[0]===buyer)?.[2] || 80);
    const targets = available.filter(p => p.club !== buyer).map(p => {
      const need = Math.max(1, p.ovr - 74) + Math.max(0, p.pot - p.ovr) * 0.8 + (p.age <= 23 ? 4 : 0);
      const affordability = p.price <= buyerStrength ? 4 : p.price <= buyerStrength * 1.5 ? 1 : -4;
      return { p, score: Math.max(0.1, need + affordability) };
    }).filter(x => x.score > 0.2);
    if (!targets.length) return;
    const total = targets.reduce((s,x) => s + x.score, 0);
    let roll = Math.random() * total, target = targets[0].p;
    for (const x of targets) { roll -= x.score; if (roll <= 0) { target = x.p; break; } }
    if (target.price > buyerStrength * 1.8 && Math.random() < 0.65) return;
    G.aiTransfers[buyer] = aiClubTransferCount(buyer) + 1;
    const sellingClub = target.club;
    target.status = 'ai-signed';
    target.signedBy = buyer;
    transferMarketPlayerToClub(target, buyer);
    const msg = buyer + ' signed ' + target.name + ' from ' + sellingClub + ' for £' + target.price + 'm.';
    G.aiTransferLog.push({ day:G.day, club:buyer, player:target.name, from:sellingClub, price:target.price });
    G.aiTransferLog = G.aiTransferLog.slice(-12);
    G.transferMessages.push(msg);
  }
  function maybeGenerateIncomingBid() {
    refreshTransferWindow();
    if (!G.windowOpen || G.incomingBids.length >= 3 || Math.random() > 0.22) return;
    const candidates = G.squad.filter(p => !p.sold && !p.onLoan && p.age < 36 && !G.incomingBids.some(b => b.playerId === p.id));
    if (!candidates.length) return;
    const weighted = candidates.map(p => ({ p, score: Math.max(1, p.ovr - 68) + (p.age <= 23 ? 7 : 0) + (G.starters.includes(p.id) ? 3 : 0) }));
    const total = weighted.reduce((s,x) => s + x.score, 0);
    let roll = Math.random() * total, pick = weighted[0].p;
    for (const x of weighted) { roll -= x.score; if (roll <= 0) { pick = x.p; break; } }
    const clubs = [...PL_TEAMS.map(t => t[0]), ...EURO_TEAMS.map(t => t[0])].filter(c => c !== 'Man Utd');
    const base = playerValue(pick);
    const premium = G.starters.includes(pick.id) ? 1.18 : 1.02;
    const repBonus = 1 + Math.max(0, (G.reputation - 78) * 0.006);
    const price = Math.round(base * premium * repBonus * (0.88 + Math.random() * 0.34));
    const bidder = PICK(clubs);
    G.incomingBids.push({ id:G.nextBidId++, playerId:pick.id, playerName:pick.name, club:bidder, price, day:G.day });
    G.transferMessages.push(bidder + ' submitted a £' + price + 'm bid for ' + pick.name + '.');
  }
  function acceptIncomingBid(id) {
    refreshTransferWindow();
    if (!G.windowOpen) { G.transferMessages.push('Transfer window closed — sales can only be completed in June, July, August, or January.'); render(); return; }
    const bid = G.incomingBids.find(b => b.id === id);
    if (!bid) return;
    const p = G.squad.find(x => x.id === bid.playerId);
    G.incomingBids = G.incomingBids.filter(b => b.id !== id);
    if (!p || p.sold) { render(); return; }
    const kept = saleBudgetReturn(bid.price);
    p.sold = true; G.budget += kept;
    addToClubRoster(bid.club, p.name);
    G.starters = G.starters.filter(sid => sid !== p.id);
    G.transferMessages.push('Accepted ' + bid.club + ' bid — sold ' + p.name + ' for £' + bid.price + 'm. £' + kept + 'm added to the budget.');
    autoPickXI(); render();
  }
  function declineIncomingBid(id) {
    const bid = G.incomingBids.find(b => b.id === id);
    if (!bid) return;
    G.incomingBids = G.incomingBids.filter(b => b.id !== id);
    const p = G.squad.find(x => x.id === bid.playerId);
    if (p && !p.sold) p.morale = Math.max(0, p.morale - 1);
    G.transferMessages.push('Declined ' + bid.club + ' bid for ' + bid.playerName + '.');
    render();
  }
  function sellPlayer(id) {
    refreshTransferWindow();
    const p = G.squad.find(x=>x.id===id);
    if (!p || p.sold) return;
    if (!G.windowOpen) { G.transferMessages.push('Transfer window closed — you can only sell in June, July, August, or January.'); render(); return; }
    const price = playerValue(p);
    const kept = saleBudgetReturn(price);
    p.sold = true; G.budget += kept;
    G.incomingBids = G.incomingBids.filter(b => b.playerId !== p.id);
    G.transferMessages.push('Sold ' + p.name + ' for £' + price + 'm. £' + kept + 'm added to the budget.');
    autoPickXI(); render();
  }
  function loanOutPlayer(id) {
    refreshTransferWindow();
    const p = G.squad.find(x=>x.id===id);
    if (!p || p.sold || p.onLoan || G.starters.includes(id) || p.injuryWeeks > 0) return;
    if (!G.windowOpen) { G.transferMessages.push('Transfer window closed — loans can only be arranged in June, July, August, or January.'); render(); return; }
    const smallerClubs = [...PL_TEAMS.filter(t => t[2] <= 78).map(t => t[0]), ...EUROPA_TEAMS.map(t => t[0])].filter(c => c !== 'Man Utd');
    const allClubs = [...PL_TEAMS.map(t => t[0]), ...EUROPA_TEAMS.map(t => t[0])].filter(c => c !== 'Man Utd');
    const useSmaller = p.age < 24 || p.morale < 55;

    p.onLoan = loanClub;
    p.fitness = 100;
    p.morale = Math.min(100, p.morale + 5);

  function toggleShortlist(id) {

  function scoutRecommendations() {
    const byPos = { GK:[], DEF:[], MID:[], FWD:[] };
    G.squad.filter(p => !p.sold).forEach(p => byPos[p.pos].push(p));
    return G.market.filter(p => p.status === 'available').map(p => {
      const inPos = (byPos[p.pos] || []).sort((a,b) => b.ovr - a.ovr);
      const topInPos = inPos[0]?.ovr || 0;
      const depth = inPos.length;
      let need = 0;
      if (p.ovr > topInPos) need += (p.ovr - topInPos) * 2.5;
      if (depth < (p.pos === 'GK' ? 2 : 4)) need += (4 - depth) * 4;
      if (p.pot - p.ovr >= 6 && p.age <= 22) need += 8;
      if (p.age <= 20 && p.pot >= 88) need += 6;
      if (p.price > G.budget) need -= 25;
      else if (p.price > G.budget * 0.6) need -= 6;
      return Object.assign({}, p, { need });
    }).sort((a,b) => b.need - a.need).slice(0, 12);
  }
  function scoutReport(p) {
    const traits = { FWD: ['clinical finisher','elite movement','aerial threat','blistering pace'],
      MID: ['midfield general','press-resistant','creative engine','tireless runner'],
      DEF: ['commanding centre-back','reads the game brilliantly','reliable 1v1','aerial dominance'],
      GK: ['elite shot-stopper','commanding presence','sweeper-keeper instincts'] };
    const reasons = [];
    if (p.ovr >= 88) reasons.push('world-class quality');
    else if (p.ovr >= 85) reasons.push('top-tier performer');
    if (p.pot - p.ovr >= 6 && p.age <= 22) reasons.push('huge growth ceiling');
    if (p.age <= 19) reasons.push('teenage prodigy');
    if (p.ovr >= 85 && p.age >= 30) reasons.push('proven winner');
    if (reasons.length === 0) reasons.push('solid first-team option');
    reasons.push(PICK(traits[p.pos]));
    return reasons.slice(0,2).join(' — ') + '.';
  }

  function renderDash() {

    const recent = G.results.slice(-4).reverse();
    const msgs = G.transferMessages.slice(-3).reverse();
    const bids = G.incomingBids.filter(b => G.squad.some(p => p.id === b.playerId && !p.sold));
    const injuries = G.squad.filter(p => p.injuryWeeks > 0 && !p.sold);
    const inForm = G.squad.filter(p => isInForm(p) && !p.sold);
    const next = nextFixture();
    const managerPanel = '<div class="pnl"><div class="pnl-t">Manager control room</div>' +
      '<div style="display:grid; grid-template-columns: repeat(3, 1fr); gap:10px; font-size:12px;">' +
        '<div><strong>' + G.managerName + '</strong><div style="color:var(--color-text-secondary);">Press: ' + G.mediaSentiment + '</div></div>' +
        '<div><strong>Reputation</strong><div style="color:var(--color-text-secondary);">' + G.reputation + '/94</div></div>' +
        '<div><strong>Board</strong><div style="color:var(--color-text-secondary);">' + G.boardConfidence + '% confidence</div></div>' +
      '</div>' +
      '<div style="margin-top:8px; color:var(--color-text-secondary);">Public support: ' + G.publicSupport + '% · Mood: ' + managerMoodLabel() + '</div>' +
      '<div style="margin-top:6px; color:var(--color-text-secondary);">Global fanbase: <strong style="color:var(--color-text-primary);">' + fanbaseLabel(G.fanbase || 70) + '</strong> (' + Math.round(G.fanbase || 70) + '/100) · Commercial revenue: <strong style="color:var(--color-text-primary);">£' + Math.floor(Math.max(0, (G.fanbase||70) - 70) * 0.9) + 'm/yr</strong></div></div>';
    return managerPanel + msgs.map(m => '<div class="toast">' + m + '</div>').join('') +
      (bids.length ? '<div class="pnl"><div class="pnl-t">Incoming transfer bids</div>' + bids.map(b => {
        const p = G.squad.find(x => x.id === b.playerId);
        return '<div style="display:grid; grid-template-columns: 1fr 72px 132px; gap:8px; align-items:center; padding:7px 0; border-bottom:0.5px solid var(--color-border-tertiary); font-size:12px;">' +
          '<div><strong>' + b.club + '</strong> want ' + b.playerName + '<div style="font-size:10px; color:var(--color-text-secondary); margin-top:2px;">' + (p ? roleOf(p) + ' · OVR ' + p.ovr + ' · value £' + playerValue(p) + 'm' : 'Player unavailable') + '</div></div>' +
          '<div style="font-weight:600;">£' + b.price + 'm</div>' +
          '<div style="display:flex; gap:5px; justify-content:flex-end;"><button class="btn sm pri" onclick="acceptIncomingBid(' + b.id + ')">Accept</button><button class="btn sm" onclick="declineIncomingBid(' + b.id + ')">Decline</button></div>' +
        '</div>';
      }).join('') + '</div>' : '') +
      '<div class="grid2"><div><div class="pnl-t">Upcoming fixtures</div>' +
      '<div class="pnl" style="padding:4px 0;">' + (upcoming.length ? upcoming.map(f => {
        const roster = getClubRoster(f.opp).slice(0,4).join(', ');
        return '<div class="fix">' +
          '<div class="fix-date">' + fmtDate(f.day) + '</div><div class="cmp cmp-' + f.comp + '">' + f.comp + (f.round?' '+f.round:'') + '</div>' +
          '<div>' + (f.home ? 'vs' : 'at') + ' ' + f.opp + (roster ? '<div style="font-size:10px; color:var(--color-text-tertiary); margin-top:2px;">' + roster + '</div>' : '') + '</div><div style="text-align:right; color:var(--color-text-secondary);">OVR ' + f.oppStr + '</div></div>';
      }).join('') : '<div style="padding:10px; color:var(--color-text-secondary);">No fixtures.</div>') + '</div></div>' +
      '<div><div class="pnl-t">Recent results</div><div class="pnl" style="padding:4px 0;">' + (recent.length ? recent.map(r => {
        const win = r.munGoals > r.oppGoals, drew = r.munGoals === r.oppGoals;
        const col = win ? 'var(--color-text-success)' : drew ? 'var(--color-text-warning)' : 'var(--color-text-danger)';
        const roster = getClubRoster(r.opp).slice(0,4).join(', ');
        return '<div class="fix"><div class="fix-date">' + fmtDate(r.day) + '</div><div class="cmp cmp-' + r.comp + '">' + r.comp + '</div>' +
          '<div>' + (r.home ? 'vs' : 'at') + ' ' + r.opp + (roster ? '<div style="font-size:10px; color:var(--color-text-tertiary); margin-top:2px;">' + roster + '</div>' : '') + '</div><div style="text-align:right; font-weight:500; color:' + col + ';">' + r.munGoals + '-' + r.oppGoals + '</div></div>';
      }).join('') : '<div style="padding:10px; color:var(--color-text-secondary);">No matches played.</div>') + '</div></div></div>' +
      '<div class="grid2"><div class="pnl"><div class="pnl-t">Injury list (' + injuries.length + ')</div>' + (injuries.length ? injuries.map(p => '<div style="display:flex; justify-content:space-between; padding:4px 0; font-size:12px;"><span>' + p.name + ' (' + roleOf(p) + ')</span><span style="color:var(--color-text-danger);">' + Math.ceil(p.injuryWeeks) + 'w</span></div>').join('') : '<div style="color:var(--color-text-secondary); font-size:12px;">Everyone fit.</div>') + '</div>' +
      '<div class="pnl"><div class="pnl-t">Elite form (' + inForm.length + ')</div>' + (inForm.length ? inForm.map(p => '<div style="display:flex; justify-content:space-between; padding:4px 0; font-size:12px;"><span>' + p.name + ' (' + roleOf(p) + ')</span><span style="color:var(--color-text-success);">avg ' + (p.matchRatings.slice(-5).reduce((a,b)=>a+b,0)/Math.min(5,p.matchRatings.length)).toFixed(1) + '</span></div>').join('') : '<div style="color:var(--color-text-secondary); font-size:12px;">No one hot.</div>') + '</div></div>' +
      (G.trophies.length ? '<div class="pnl"><div class="pnl-t">Trophy cabinet</div>' + G.trophies.map(t=>'<span class="trophy">' + t + '</span>').join('') + '</div>' : '') +
      (() => {
        const talks = (G.trashTalks || []).filter(t => t.expiresDay > G.day);
        if (!talks.length) return '';
        return '<div class="pnl"><div class="pnl-t">🗣 Active rivalries</div>' +
          talks.map(t => {
            const daysLeft = Math.ceil((t.expiresDay - G.day) / 30);
            const nextGame = G.fixtures.find(f => !f.played && f.opp === t.club);
            if (t.type === 'opp') {
              return '<div style="font-size:12px; padding:6px 0; border-bottom:0.5px solid var(--color-border-tertiary);">' +
                '🔥 <strong>' + t.oppPlayer + '</strong> <span style="color:var(--color-text-secondary);">(' + t.club + ') called us out</span>' +
                ' <span style="color:var(--color-text-secondary);">· ' + daysLeft + ' month' + (daysLeft !== 1 ? 's' : '') + ' left</span>' +
                (nextGame ? '<div style="color:var(--color-text-success); font-size:10px; margin-top:2px;">Next face-off: ' + fmtDate(nextGame.day) + ' · +3 ATK boost — dressing room is fired up</div>' : '') +
              '</div>';
            }
            const p = G.squad.find(x => x.id === t.playerId);
            const notStarting = !G.starters.includes(t.playerId);
            return '<div style="font-size:12px; padding:6px 0; border-bottom:0.5px solid var(--color-border-tertiary);">' +
              '🗣 <strong>' + t.playerName + '</strong> vs <strong>' + t.club + '</strong>' +
              ' <span style="color:var(--color-text-secondary);">· ' + daysLeft + ' month' + (daysLeft !== 1 ? 's' : '') + ' left</span>' +
              (nextGame ? '<div style="color:var(--color-text-secondary); font-size:10px; margin-top:2px;">Next face-off: ' + fmtDate(nextGame.day) + (notStarting && p ? ' · <span style="color:var(--color-text-warning);">⚠ ' + p.name.split(' ').pop() + ' must start — REDEMPTION</span>' : '') + '</div>' : '') +
            '</div>';
          }).join('') +
        '</div>';
      })() +
      (() => {
        const check = lineupIsValid();
        const label = next ? 'Advance to ' + fmtDate(next.day) + ' · ' + next.comp + (next.round?' '+next.round:'') + ' ' + (next.home?'vs':'at') + ' ' + next.opp : 'End season';
        const tt = next && (G.trashTalks || []).find(t => t.type === 'own' && t.club === next.opp && t.expiresDay > G.day && !G.starters.includes(t.playerId));
        if (!check.ok && next) {
          const msg = check.gkOutfield ? 'A goalkeeper is in an outfield position — fix your lineup before playing.' : 'No goalkeeper in goal — fix your lineup before playing.';
          return '<div style="padding:10px 12px; background:var(--color-background-danger); color:var(--color-text-danger); border-radius:var(--border-radius-md); font-size:12px; margin-bottom:8px;">⚠ ' + msg + '</div>' +
            '<button class="play-btn" disabled>' + label + '</button>';
        }
        const ttWarn = tt ? '<div style="padding:8px 12px; background:rgba(250,199,117,0.12); color:var(--color-text-warning); border-radius:var(--border-radius-md); font-size:12px; margin-bottom:8px;">⚠ REDEMPTION — ' + tt.playerName + ' must start vs ' + next.opp + ' or miss his chance to back up his words.</div>' : '';
        return ttWarn + '<button class="play-btn" onclick="advance()">' + label + '</button>';
      })();
  }

  function renderMatch() {
    if (!G.currentMatch) return '<div>No match.</div>';
    const cm = G.currentMatch, fx = cm.fx;
    const oppRoster = getClubRoster(fx.opp);
    const oppKeyPlayers = oppRoster.length ? oppRoster.slice(0,6).join(', ') : 'No tracked squad data';
    const postMatch = cm.done && cm.matchRatings ? '<div class="pnl"><div class="pnl-t">Match ratings</div>' +
      getXI().sort((a,b) => (cm.matchRatings[b.id]||0) - (cm.matchRatings[a.id]||0)).map(p => {
        const mr = cm.matchRatings[p.id];
        const col = mr >= 8 ? '#3B6D11' : mr >= 7 ? '#173404' : mr >= 6 ? '#854F0B' : '#A32D2D';
        return '<div style="display:grid; grid-template-columns: 14px 1fr 32px 50px 60px; gap:6px; padding:3px 6px; font-size:11px; align-items:center;">' +
          '<span>' + roleBadge(p) + '</span><span>' + p.name + '</span>' +
          '<span>' + ((cm.perPlayerGoals[p.id]||0) > 0 ? '⚽' + cm.perPlayerGoals[p.id] : '') + '</span>' +
          '<span style="color:var(--color-text-secondary);">' + ((cm.perPlayerAssists[p.id]||0) > 0 ? 'assist ' + cm.perPlayerAssists[p.id] : '') + '</span>' +
          '<span style="font-weight:500; color:' + col + ';">' + mr.toFixed(1) + '</span></div>';
      }).join('') + '</div>' : '';
    return '<div style="display:flex; align-items:center; justify-content:space-between; margin-bottom:8px;">' +
      '<div><div class="cmp cmp-' + fx.comp + '" style="display:inline-block;">' + fx.comp + (fx.round?' · '+fx.round:'') + '</div>' +
      '<span style="margin-left:8px; color:var(--color-text-secondary); font-size:12px;">' + fmtDateLong(G.day) + ' · ' + (fx.home?'Home':'Away') + ' · weight ' + matchWeight(fx).toFixed(1) + 'x</span></div></div>' +
      '<div class="scoreboard">' +
        '<div><div style="font-size:11px; color:var(--color-text-secondary);">Man Utd</div><div style="font-size:30px; font-weight:500;">' + cm.home + '</div></div>' +
        '<div style="font-size:11px; color:var(--color-text-tertiary); text-transform:uppercase; letter-spacing:0.08em;">' + (cm.playing?'Live':'Full time') + '</div>' +
        '<div style="text-align:right;"><div style="font-size:11px; color:var(--color-text-secondary);">' + fx.opp + '</div><div style="font-size:30px; font-weight:500;">' + cm.away + '</div></div>' +
      '</div>' +
      '<div class="pnl"><div class="pnl-t">' + fx.opp + ' tracked squad</div><div style="font-size:12px; color:var(--color-text-secondary);">' + oppKeyPlayers + '</div></div>' +
      '<div class="pnl"><div class="pnl-t">Commentary</div><div class="comm" id="comm-log">' +
        cm.comm.map(c => '<div class="comm-l ' + c.t + '"><span class="min">' + (typeof c.m==='number'?c.m+"'":c.m) + '</span>' + c.text + '</div>').join('') +
      '</div></div>' + postMatch +
      (cm.done ? '<button class="play-btn" onclick="closeMatch()">Continue</button>' : '<div style="padding: 8px; color:var(--color-text-secondary); text-align:center; font-size:12px;">Match in progress…</div>');
  }

  function renderSquadHub() {
    const roleLabels = { GK:'Goalkeepers', RB:'Right backs', CB:'Centre backs', LB:'Left backs', CDM:'Defensive mids', CM:'Central mids', CAM:'Attacking mids', RM:'Right mids', LM:'Left mids', RW:'Right wingers', LW:'Left wingers', ST:'Strikers' };
    const assignments = getFormationAssignments();
    const slotCard = (a) => {
      const p = a.player;
      if (!p) return '<div class="slot-card"><div class="slot-pos">' + a.slot + '</div><div class="slot-name">Open</div></div>';
      const offRole = roleOf(p) !== a.slot ? '<div class="slot-offrole">natural ' + roleOf(p) + '</div>' : '';
      return '<div class="slot-card" title="' + p.name + ' · ' + roleOf(p) + ' · OVR ' + ROUND(effectiveRating(p)) + '">' +
        '<div class="slot-pos">' + a.slot + '</div><div class="slot-name">' + p.name.split(' ').pop().slice(0,10) + '</div>' +
        '<div class="slot-meta"><span>' + ROUND(effectiveRating(p)) + '</span>' + (isInForm(p)?'<span>★</span>':'') + '</div>' + offRole + '</div>';
    };
    const slotRows = assignments.map(row => '<div class="pitch-row">' + row.map(slotCard).join('') + '</div>').join('');
    const slotList = assignments.flat().map(a => {
      const p = a.player;
      return '<div class="slot-list-row">' +
        '<span>' + roleBadge({ name:a.slot, pos:slotGroup(a.slot), role:a.slot }) + '</span>' +
        '<span>' + (p ? p.name : 'Open slot') + (p && roleOf(p)!==a.slot ? ' <span style="color:var(--color-text-warning); font-size:10px;">natural ' + roleOf(p) + '</span>' : '') + '</span>' +
        '<span>' + (p ? ROUND(effectiveRating(p)) : '—') + '</span>' +
        '<span style="color:var(--color-text-secondary);">' + slotGroup(a.slot) + '</span>' +
      '</div>';
    }).join('');
    const shape = getFormationShape(G.formation).flat();
    const shapeSummary = POSITION_ORDER.filter(r => shape.includes(r)).map(r => r + ' x' + shape.filter(s => s===r).length).join(' · ');
    return '<div class="pnl">' +
      '<div style="display:flex; gap:6px; flex-wrap:wrap; align-items:center;">' +
        '<span style="font-size:10px; color:var(--color-text-secondary); text-transform:uppercase; letter-spacing:0.05em;">Formation</span>' +
        ['4-3-3','4-2-3-1','4-4-2','3-5-2','5-3-2'].map(f => '<button class="btn ' + (G.formation===f?'pri':'') + '" onclick="setFormation(\'' + f + '\')">' + f + '</button>').join('') +
        '<span style="font-size:10px; color:var(--color-text-secondary); text-transform:uppercase; letter-spacing:0.05em; margin-left: 8px;">Mentality</span>' +
        ['attack','balanced','defensive'].map(t => '<button class="btn ' + (G.tactic===t?'pri':'') + '" onclick="setTactic(\'' + t + '\')">' + (t[0].toUpperCase()+t.slice(1)) + '</button>').join('') +
      '</div>' +
      '<div style="display:flex; gap:6px; margin-top:8px;">' +
        '<button class="btn pri" onclick="autoPickXIAndRender()">Best XI</button>' +
        '<button class="btn" onclick="setFreshestXI()">Freshest XI</button>' +
      '</div><div style="font-size:11px; color:var(--color-text-secondary); margin-top:8px;">Shape: ' + shapeSummary + '</div></div>' +
      '<div class="formation-board">' +
        '<div class="pnl" style="padding: 6px;"><div class="pnl-t">' + G.formation + ' tactical board</div><div class="pitch">' + slotRows + '</div></div>' +
        '<div class="pnl" style="padding: 6px;"><div class="pnl-t">Formation slots</div>' +
          '<div class="slot-list-row lineup-head" style="background:transparent;"><span>Pos</span><span>Player</span><span>Eff</span><span>Band</span></div>' + slotList + '</div>' +
      '</div>' +
      '<div class="toast">Best XI now fills the specific formation positions first, then uses compatible players if a natural fit is unavailable.</div>' +
      (() => {
        const duos = G.activeDuos || [];
        if (!duos.length) return '';
        return '<div class="pnl"><div class="pnl-t">⚡ Dynamic Duos</div>' +
          duos.map(d => {
            const p1 = G.squad.find(p => p.id === d.p1Id);
            const p2 = G.squad.find(p => p.id === d.p2Id);
            if (!p1 || !p2) return '';
            const both = G.starters.includes(d.p1Id) && G.starters.includes(d.p2Id);
            const icon = d.type === 'attack' ? '⚡' : '🛡';
            const label = d.type === 'attack' ? d.count + ' goal connections' : d.count + ' clean sheets together';
            const bonus = both ? ' <span style="color:var(--color-text-success); font-size:10px;">ACTIVE +ATK</span>' : '';
            const defBonus = d.type === 'defense' && both ? ' <span style="color:var(--color-text-success); font-size:10px;">ACTIVE +DEF</span>' : '';
            return '<div style="display:flex; justify-content:space-between; align-items:center; padding:6px 0; border-bottom:0.5px solid var(--color-border-tertiary); font-size:12px;">' +
              '<span>' + icon + ' <strong>' + p1.name.split(' ').pop() + ' & ' + p2.name.split(' ').pop() + '</strong>' +
                (d.type === 'attack' ? bonus : defBonus) + '</span>' +
              '<span style="color:var(--color-text-secondary);">' + label + '</span>' +
            '</div>';
          }).join('') +
        '</div>';
      })() +
      POSITION_ORDER.map(pos => {
        const players = G.squad.filter(p => !p.sold && !p.academyTeam && roleOf(p) === pos).sort((a,b) => effectiveRating(b) - effectiveRating(a));
        if (!players.length) return '';
        const startersCount = players.filter(p => G.starters.includes(p.id)).length;
        return '<div class="pnl" style="padding: 6px 8px;">' +
          '<div class="lineup-head">' + roleLabels[pos] + ' · ' + startersCount + ' in XI · ' + players.length + ' in squad</div>' +
          '<div class="lineup-row lineup-head" style="background:transparent; padding:2px 6px;">' +
            '<span></span><span>Player</span><span>Pos</span><span>OVR (eff)</span><span>Form</span><span>Change</span><span>Fit</span><span>Mor</span><span>Action</span><span></span>' +
          '</div>' +
          players.map(p => renderLineupRow(p)).join('') +
        '</div>';
      }).join('');
  }

  function renderLineupRow(p) {
    const isStarter = G.starters.includes(p.id);
    const eff = ROUND(effectiveRating(p));
    const bonus = formBonus(p);
    const moraleCol = p.morale >= 75 ? '#97C459' : p.morale >= 50 ? '#FAC775' : '#F09595';
    const fitCol = p.fitness >= 75 ? '#97C459' : p.fitness >= 50 ? '#FAC775' : '#F09595';
    const injured = p.injuryWeeks > 0;
    const form = getFormStatus(p);
    const role = getSquadRole(p);
    const dot = isStarter ? '<span style="color:#DA291C; font-size:14px;">●</span>' : '<span style="color:var(--color-border-tertiary); font-size:14px;">○</span>';
    const tier = tierOf(p.ovr);
    const recent = p.matchRatings.slice(-3);
    const recentChips = recent.map(r => {
      const col = r >= 8 ? '#97C459' : r >= 7 ? '#C0DD97' : r >= 6.5 ? '#D3D1C7' : '#F09595';
      const txt = r >= 6.5 ? '#173404' : '#501313';
      return '<span class="rating-chip" style="background:' + col + '; color:' + txt + ';">' + r.toFixed(1) + '</span>';
    }).join('');
    return '<div class="lineup-row ' + (isStarter ? 'is-starter' : '') + '">' +
      '<span>' + dot + '</span>' +
      '<span style="overflow:hidden; text-overflow:ellipsis; white-space:nowrap;">' +
        p.name + ' <span style="color:var(--color-text-tertiary); font-size:10px;">' + p.age + '</span>' +
        (injured ? '<span class="badge inj">INJ ' + Math.ceil(p.injuryWeeks) + 'w</span>' : '') +
        (p.suspended ? '<span class="badge inj">SUS</span>' : '') +
        (p.onLoan ? '<span class="badge new">LOAN</span>' : '') +
        (p.newSigning ? '<span class="badge new">NEW</span>' : '') +
        '<span style="display:block; font-size:10px; color:var(--color-text-tertiary); margin-top:1px;">' + (recentChips || '<span style="opacity:0.5;">no matches yet</span>') + '</span>' +
      '</span>' +
      '<span>' + roleBadge(p) + '</span>' +
      '<span><span class="ovr ' + tier + '">' + eff + '</span>' + (bonus!==0?' <span style="font-size:9px; color:' + (bonus>0?'#3B6D11':'#A32D2D') + ';">' + (bonus>0?'+':'') + bonus + '</span>':'') + '</span>' +
      '<span><span class="form-tag form-' + form + '">' + form + '</span></span>' +
      '<span>' + roleSelect(p) + '</span>' +
      '<span><span class="mor-bar"><span class="mor-fill" style="width:' + p.fitness + '%; background:' + fitCol + ';"></span></span></span>' +
      '<span><span class="mor-bar"><span class="mor-fill" style="width:' + p.morale + '%; background:' + moraleCol + ';"></span></span></span>' +
      '<span>' + (injured || p.suspended || p.onLoan ? '<span style="font-size:10px; color:var(--color-text-tertiary);">' + (p.onLoan ? 'At ' + p.onLoan : 'Unavailable') + '</span>'
        : isStarter ? '<button class="btn sm" onclick="benchPlayer(' + p.id + ')" style="width: 70px;">Bench →</button>'
        : '<button class="btn sm pri" onclick="startPlayer(' + p.id + ')" style="width: 70px;">→ Start</button>') + '</span>' +
      '<span style="display:flex; gap:3px;"><button class="btn sm" onclick="loanOutPlayer(' + p.id + ')" title="Loan out" ' + (isStarter || injured || p.onLoan ? 'disabled' : '') + '>L</button><button class="btn sm" onclick="sellPlayer(' + p.id + ')" title="Transfer list">£</button></span>' +
    '</div>';
  }

  function renderTransfers() {
    const available = G.market.filter(p => p.status === 'available').sort((a,b) => {
      const aS = G.shortlist.includes(a.id) ? 1 : 0;
      const bS = G.shortlist.includes(b.id) ? 1 : 0;
      return bS - aS || POSITION_ORDER.indexOf(roleOf(a)) - POSITION_ORDER.indexOf(roleOf(b)) || b.ovr - a.ovr;
    });
    const aiMoves = G.aiTransferLog.slice(-5).reverse();
    return (!G.windowOpen ? '<div class="toast">Transfer window closed.</div>' : '') +
      (G.shortlist.length ? '<div class="toast">Shortlist: ' + G.shortlist.length + ' player' + (G.shortlist.length>1?'s':'') + ' tracked.</div>' : '') +
      (aiMoves.length ? '<div class="pnl"><div class="pnl-t">Other clubs · recent market moves</div>' +
        aiMoves.map(m => '<div style="display:grid; grid-template-columns: 62px 1fr 58px; gap:8px; align-items:center; padding:5px 0; font-size:11px; border-bottom:0.5px solid var(--color-border-tertiary);">' +
          '<span class="fix-date">' + fmtDate(m.day) + '</span><span><strong>' + m.club + '</strong> signed ' + m.player + ' from ' + m.from + '</span><span style="text-align:right;">£' + m.price + 'm</span></div>').join('') +

  function renderTables() {

    const cl = clSorted();
    const el = elSorted();
    const ko = G.clKnockout;
    const elKo = G.elKnockout;
    const bracketRows = ko && (ko.history.length || ko.ties.length) ? [...ko.history, ...ko.ties].map(t =>
      '<div class="fix"><div class="fix-date">' + t.round + '</div><div></div><div>' + t.a + ' vs ' + t.b + '</div><div style="text-align:right; font-weight:500; color:' + (t.winner==='Man Utd'?'var(--color-text-success)':t.winner?'var(--color-text-secondary)':'var(--color-text-warning)') + ';">' +
      (t.leg ? t.aGoals + '-' + t.bGoals + (t.note ? ' ' + t.note : '') + (t.winner ? ' · ' + t.winner : ' agg') : 'scheduled') + '</div></div>').join('') : '';
    const europaRows = elKo && elKo.history.length ? elKo.history.map(t =>
      '<div class="fix"><div class="fix-date">' + t.round + '</div><div class="cmp cmp-EL">EL</div><div>' + t.a + ' vs ' + t.b + '</div><div style="text-align:right; font-weight:500; color:var(--color-text-secondary);">' +
      t.aGoals + '-' + t.bGoals + (t.note ? ' ' + t.note : '') + ' · ' + t.winner + '</div></div>').join('') : '';
    return '<div class="grid2">' +
      '<div class="pnl"><div class="pnl-t">Premier League</div>' +
        '<div class="table-row head"><span>#</span><span>Team</span><span>P</span><span>W</span><span>D</span><span>L</span><span>GD</span><span>Pts</span></div>' +
        pl.map((t,i) => '<div class="table-row ' + (t.name==='Man Utd'?'mun':i<4?'cl-spot':'') + '"><span>' + (i+1) + '</span><span>' + t.name + (i<4?' <span style="font-size:9px; color:var(--color-text-success);">CL</span>':i===4?' <span style="font-size:9px; color:var(--color-text-warning);">5th route</span>':'') + '</span><span>' + t.P + '</span><span>' + t.W + '</span><span>' + t.D + '</span><span>' + t.L + '</span><span>' + (t.GD>0?'+':'') + t.GD + '</span><span>' + t.Pts + '</span></div>').join('') +
      '</div>' +
      '<div>' +
        '<div class="pnl"><div class="pnl-t">Champions League · 32-team league phase</div>' +
          '<div class="table-row head"><span>#</span><span>Team</span><span>P</span><span>W</span><span>D</span><span>L</span><span>GD</span><span>Pts</span></div>' +
          cl.slice(0,32).map((t,i) => '<div class="table-row ' + (t.name==='Man Utd'?'mun':i<24?'cl-spot':'') + '"><span>' + (i+1) + '</span><span>' + t.name + (i<8?' <span style="font-size:9px; color:var(--color-text-success);">R16</span>':i<24?' <span style="font-size:9px; color:var(--color-text-warning);">PO</span>':'') + '</span><span>' + t.P + '</span><span>' + t.W + '</span><span>' + t.D + '</span><span>' + t.L + '</span><span>' + (t.GD>0?'+':'') + t.GD + '</span><span>' + t.Pts + '</span></div>').join('') +
        '</div>' +
        '<div class="pnl"><div class="pnl-t">Champions League playoff path</div>' +
          (ko && ko.champion ? '<div class="trophy">European champion: ' + ko.champion + '</div>' : '') +
          (bracketRows || '<div style="padding:6px; color:var(--color-text-secondary);">Top 8 go straight to the R16. 9th-24th play one-leg playoffs for the other R16 spots.</div>') +
        '</div>' +
        '<div class="pnl"><div class="pnl-t">Europa League · top 16 league phase</div>' +
          '<div class="table-row head"><span>#</span><span>Team</span><span>P</span><span>W</span><span>D</span><span>L</span><span>GD</span><span>Pts</span></div>' +
          el.slice(0,16).map((t,i) => '<div class="table-row cl-spot"><span>' + (i+1) + '</span><span>' + t.name + '</span><span>' + t.P + '</span><span>' + t.W + '</span><span>' + t.D + '</span><span>' + t.L + '</span><span>' + (t.GD>0?'+':'') + t.GD + '</span><span>' + t.Pts + '</span></div>').join('') +
        '</div>' +
        '<div class="pnl"><div class="pnl-t">Europa League playoff</div>' +
          (elKo && elKo.champion ? '<div class="trophy">Europa League champion: ' + elKo.champion + '</div>' : '') +
          (europaRows || '<div style="padding:6px; color:var(--color-text-secondary);">Europa League playoff not generated yet.</div>') +
        '</div>' +
        '<div class="pnl"><div class="pnl-t">FA Cup run</div>' +
          (G.cupRounds.FA.length ? G.cupRounds.FA.map(r => '<div class="fix"><div class="fix-date">' + r.round + '</div><div></div><div>vs ' + r.opp + '</div><div style="text-align:right; font-weight:500; color:' + (r.won?'var(--color-text-success)':'var(--color-text-danger)') + ';">' + r.score + '</div></div>').join('') : '<div style="padding:6px; color:var(--color-text-secondary);">Not entered yet.</div>') +
        '</div>' +
        '<div class="pnl"><div class="pnl-t">EFL Cup run</div>' +
          (G.cupRounds.EFL.length ? G.cupRounds.EFL.map(r => '<div class="fix"><div class="fix-date">' + r.round + '</div><div></div><div>vs ' + r.opp + '</div><div style="text-align:right; font-weight:500; color:' + (r.won?'var(--color-text-success)':'var(--color-text-danger)') + ';">' + r.score + '</div></div>').join('') : '<div style="padding:6px; color:var(--color-text-secondary);">Not entered yet.</div>') +
        '</div>' +
      '</div></div>';
  }

  function renderTraining() {
    return '<div class="pnl"><div class="pnl-t">Top performers · current season</div>' +
      G.squad.filter(p => !p.sold && p.matchRatings.length > 0).sort((a,b) => {
        const aA = a.matchRatings.reduce((s,r)=>s+r,0)/a.matchRatings.length;
        const bA = b.matchRatings.reduce((s,r)=>s+r,0)/b.matchRatings.length;
        return bA - aA;
      }).slice(0, 12).map(p => {
        const avg = p.matchRatings.reduce((s,r)=>s+r,0)/p.matchRatings.length;
        const bigAvg = p.bigGameRatings.length ? p.bigGameRatings.reduce((s,r)=>s+r,0)/p.bigGameRatings.length : null;
        return '<div style="display:grid; grid-template-columns: 32px 1fr 32px 60px 80px 80px; gap:6px; padding:5px 6px; font-size:11px; align-items:center; border-bottom: 0.5px solid var(--color-border-tertiary);">' +
          '<span>' + roleBadge(p) + '</span><span>' + p.name + '</span><span>' + p.age + '</span>' +
          '<span><span class="ovr ' + tierOf(p.ovr) + '">' + p.ovr + '</span></span>' +
          '<span style="color:var(--color-text-secondary);">avg ' + avg.toFixed(2) + '</span>' +
          '<span style="color:var(--color-text-secondary);">' + (bigAvg ? 'big ' + bigAvg.toFixed(2) : '—') + '</span></div>';
      }).join('') + '</div>';
  }

  function renderCulture() {
    const stadiumCost = 45 + G.stadiumLevel * 35;
    const lvl = G.stadiumLevel;
    const capacity = [74000, 78000, 82000, 87000, 92000][lvl - 1];
    const revenue = 15 + lvl * 6;
    const nextCapacity = lvl < 5 ? [74000, 78000, 82000, 87000, 92000][lvl] : null;
    const nextRevenue = lvl < 5 ? 15 + (lvl + 1) * 6 : null;
    const moraleBoost = (lvl - 1) * 2;
    const stadiumHtml = '<div class="pnl"><div class="pnl-t">Stadium · Level ' + lvl + ' / 5</div>' +
      '<div style="display:grid; grid-template-columns: repeat(3,1fr); gap:10px; font-size:12px; margin-bottom:10px;">' +
        '<div><strong>' + capacity.toLocaleString() + '</strong><div style="color:var(--color-text-secondary); font-size:10px;">Capacity</div></div>' +
        '<div><strong>£' + revenue + 'm</strong><div style="color:var(--color-text-secondary); font-size:10px;">Annual revenue</div></div>' +
        '<div><strong>+' + moraleBoost + '</strong><div style="color:var(--color-text-secondary); font-size:10px;">Morale bonus</div></div>' +
      '</div>' +
      '<div style="display:grid; grid-template-columns: 1fr 92px 86px; gap:8px; align-items:center; font-size:12px;">' +
        '<div style="color:var(--color-text-secondary); font-size:11px;">' + (lvl < 5 ? 'Next: ' + nextCapacity.toLocaleString() + ' seats · £' + nextRevenue + 'm/yr · +' + (lvl * 2) + ' morale' : 'Maximum level reached') + '</div>' +
        '<span>' + (lvl >= 5 ? '—' : '£' + stadiumCost + 'm') + '</span>' +
        '<button class="btn sm ' + (G.budget >= stadiumCost && lvl < 5 ? 'pri' : '') + '" onclick="upgradeStadium()" ' + (G.budget < stadiumCost || lvl >= 5 ? 'disabled' : '') + '>Upgrade</button>' +
      '</div></div>';

    const cultureHtml = '<div class="pnl"><div class="pnl-t">Club identity · choose your DNA</div>' +
      '<p style="font-size:12px; color:var(--color-text-secondary); margin:0 0 12px;">Your culture shapes how you play, how fans react, and how easy it is to build a squad. It cannot be changed mid-season.</p>' +
      '<div style="display:grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap:10px;">' +
      CULTURES.map(c => {
        const active = G.culture === c.id;
        return '<div style="border:1.5px solid ' + (active ? 'var(--color-primary)' : 'var(--color-border-secondary)') + '; border-radius:8px; padding:12px; cursor:pointer; background:' + (active ? 'rgba(218,41,28,0.06)' : 'var(--color-background-secondary)') + ';" onclick="setCulture(\'' + c.id + '\')">' +
          '<div style="display:flex; align-items:center; gap:8px; margin-bottom:6px;">' +
            '<span style="font-size:20px;">' + c.icon + '</span>' +
            '<div><strong style="font-size:13px;">' + c.name + '</strong><div style="font-size:10px; color:var(--color-text-secondary);">' + c.sub + '</div></div>' +
            (active ? '<span style="margin-left:auto; font-size:10px; background:var(--color-primary); color:#fff; padding:2px 6px; border-radius:4px;">ACTIVE</span>' : '') +
          '</div>' +
          '<p style="font-size:11px; color:var(--color-text-secondary); margin:0 0 8px; line-height:1.4;">' + c.desc + '</p>' +
          c.pros.map(p => '<div style="font-size:11px; color:var(--color-text-success); margin-bottom:2px;">✓ ' + p + '</div>').join('') +
          c.cons.map(p => '<div style="font-size:11px; color:var(--color-text-danger); margin-top:2px;">✗ ' + p + '</div>').join('') +
        '</div>';
      }).join('') +
      '</div></div>';

    return cultureHtml + stadiumHtml;
  }

  function renderAcademy() {
    const academyRow = (p, team) => '<div class="academy-row">' +
      '<span style="overflow:hidden; text-overflow:ellipsis; white-space:nowrap;">' + p.name + '<span style="display:block; font-size:10px; color:var(--color-text-tertiary);">' + p.apps + ' youth apps · ' + p.goals + 'G ' + p.assists + 'A</span></span>' +
      '<span>' + p.age + '</span><span>' + roleBadge(p) + '</span>' +
      '<span><span class="ovr ' + tierOf(p.ovr) + '">' + p.ovr + '</span></span>' +
      '<span style="color:var(--color-text-secondary);">' + p.pot + ' pot</span>' +
      '<span><button class="btn sm pri" onclick="promoteYouth(\'' + team + '\',' + p.id + ')">Promote</button></span>' +
    '</div>';
    const teamPanel = (team, label) => '<div class="pnl" style="padding:6px 8px;"><div class="pnl-t">' + label + ' · ' + academyPlayers(team).length + '/5</div>' +
      '<div class="academy-row head"><span>Player</span><span>Age</span><span>Pos</span><span>OVR</span><span>Ceiling</span><span></span></div>' +
      academyPlayers(team).map(p => academyRow(p, team)).join('') +
    '</div>';
    const u21Seniors = G.squad.filter(p => !p.sold && p.academyTeam === 'U21');
    const seniorOptions = G.squad.filter(p => !p.sold && !p.academyTeam && !G.starters.includes(p.id) && p.age <= 24).sort((a,b) => a.age - b.age || a.ovr - b.ovr).slice(0,10);
    return '<div class="toast">Academy players develop quickly until the mid/high 70s. After that, promote them for senior minutes if you want them to keep climbing.</div>' +
      '<div class="grid2">' + teamPanel('u21','U21 squad') + teamPanel('u18','U18 squad') + '</div>' +
      '<div class="pnl" style="padding:6px 8px;"><div class="pnl-t">Senior players in U21 games</div>' +
        (u21Seniors.length ? u21Seniors.map(p => '<div class="academy-row" style="grid-template-columns:1fr 34px 34px 40px 54px 118px;"><span>' + p.name + '</span><span>' + p.age + '</span><span>' + roleBadge(p) + '</span><span><span class="ovr ' + tierOf(p.ovr) + '">' + p.ovr + '</span></span><span>sharpness</span><span><button class="btn sm" onclick="recallSenior(' + p.id + ')">Recall</button></span></div>').join('') : '<div style="font-size:12px; color:var(--color-text-secondary); padding:6px;">No senior players assigned to U21.</div>') +
      '</div>' +
      '<div class="pnl" style="padding:6px 8px;"><div class="pnl-t">Send young senior players down</div>' +
        (seniorOptions.length ? seniorOptions.map(p => '<div class="academy-row" style="grid-template-columns:1fr 34px 34px 40px 54px 118px;"><span>' + p.name + '</span><span>' + p.age + '</span><span>' + roleBadge(p) + '</span><span><span class="ovr ' + tierOf(p.ovr) + '">' + p.ovr + '</span></span><span>' + p.pot + ' pot</span><span><button class="btn sm" onclick="sendSeniorToU21(' + p.id + ')">Send U21</button></span></div>').join('') : '<div style="font-size:12px; color:var(--color-text-secondary); padding:6px;">No eligible young bench players right now.</div>') +
      '</div>';
  }

  function renderStats() {
    const players = G.squad.filter(p => !p.sold).sort((a,b) => {
      const aGA = a.goals + a.assists;
      const bGA = b.goals + b.assists;
      return bGA - aGA || b.goals - a.goals || b.assists - a.assists || b.appearances - a.appearances || b.ovr - a.ovr;
    });
    const totalGoals = players.reduce((sum,p) => sum + p.goals, 0);
    const totalAssists = players.reduce((sum,p) => sum + p.assists, 0);
    const topScorer = players.find(p => p.goals > 0);
    const topCreator = [...players].sort((a,b) => b.assists - a.assists || b.goals - a.goals)[0];
    const empty = totalGoals === 0 && totalAssists === 0;
    const statBox = (label, value, sub) => '<div class="pnl" style="margin-bottom:0;"><div class="pnl-t">' + label + '</div><div style="font-size:24px; font-weight:600; line-height:1;">' + value + '</div><div style="font-size:11px; color:var(--color-text-secondary); margin-top:5px;">' + sub + '</div></div>';
    const history = G.seasonHistory.slice().reverse();
    const historyHtml = '<div class="pnl" style="padding:6px 8px;"><div class="pnl-t">Completed season archive</div>' +
      (history.length ? history.map(s => '<div style="border-bottom:0.5px solid var(--color-border-tertiary); padding:8px 0;">' +
        '<div style="display:grid; grid-template-columns: 72px 1fr 70px 84px; gap:8px; align-items:center; font-size:12px;">' +
          '<strong>' + s.label + '</strong>' +
          '<span>' + s.stats.played + ' played · ' + s.stats.won + 'W ' + s.stats.drawn + 'D ' + s.stats.lost + 'L · GF ' + s.stats.gf + ' GA ' + s.stats.ga + '</span>' +
          '<span>' + ordinal(s.leaguePos) + ' PL</span>' +
          '<span style="text-align:right;">' + s.trophies.length + ' trophies</span>' +
        '</div>' +
        '<div style="font-size:11px; color:var(--color-text-secondary); margin-top:5px;">Top scorer: ' + (s.topScorer && s.topScorer.goals > 0 ? s.topScorer.name + ' (' + s.topScorer.goals + ')' : 'none') + ' · Top assists: ' + (s.topCreator && s.topCreator.assists > 0 ? s.topCreator.name + ' (' + s.topCreator.assists + ')' : 'none') + '</div>' +
        (s.trophies.length ? '<div style="margin-top:6px;">' + s.trophies.map(t=>'<span class="trophy">' + t + '</span>').join('') + '</div>' : '') +
        '<div class="lineup-row lineup-head" style="grid-template-columns: 24px 1fr 34px 36px 36px 40px 48px; background:transparent; padding:7px 0 2px;">' +
          '<span>#</span><span>Player</span><span>Pos</span><span>G</span><span>A</span><span>G+A</span><span>Apps</span>' +
        '</div>' +
        s.players.slice(0,12).map((p,i) => '<div class="lineup-row" style="grid-template-columns: 24px 1fr 34px 36px 36px 40px 48px; padding:4px 0;">' +
          '<span style="color:var(--color-text-tertiary);">' + (i+1) + '</span><span style="overflow:hidden; text-overflow:ellipsis; white-space:nowrap;">' + p.name + '</span>' +
          '<span><span class="pos pos-' + p.role + '">' + p.role + '</span></span><span>' + p.goals + '</span><span>' + p.assists + '</span><span>' + p.ga + '</span><span style="color:var(--color-text-secondary);">' + p.apps + '</span>' +
        '</div>').join('') +
      '</div>').join('') : '<div style="padding:6px; color:var(--color-text-secondary); font-size:12px;">Finish a season to archive its stats here.</div>') +
    '</div>';
    return '<div class="grid2" style="margin-bottom:10px;">' +
        statBox('Team goals', totalGoals, topScorer ? 'Leader: ' + topScorer.name + ' (' + topScorer.goals + ')' : 'No goals yet') +
        statBox('Team assists', totalAssists, topCreator && topCreator.assists > 0 ? 'Leader: ' + topCreator.name + ' (' + topCreator.assists + ')' : 'No assists yet') +
      '</div>' +
      (empty ? '<div class="toast">Play matches to start filling the season stats table.</div>' : '') +
      '<div class="pnl" style="padding:6px 8px;"><div class="pnl-t">Player stats · current season</div>' +
        '<div class="lineup-row lineup-head" style="grid-template-columns: 24px 1fr 34px 44px 44px 44px 54px; background:transparent; padding:2px 6px;">' +
          '<span>#</span><span>Player</span><span>Pos</span><span>G</span><span>A</span><span>G+A</span><span>Apps</span>' +
        '</div>' +
        players.map((p,i) => '<div class="lineup-row" style="grid-template-columns: 24px 1fr 34px 44px 44px 44px 54px;">' +
          '<span style="color:var(--color-text-tertiary);">' + (i+1) + '</span>' +
          '<span style="overflow:hidden; text-overflow:ellipsis; white-space:nowrap;">' + p.name + '</span>' +
          '<span>' + roleBadge(p) + '</span>' +
          '<span style="font-weight:500;">' + p.goals + '</span>' +
          '<span style="font-weight:500;">' + p.assists + '</span>' +
          '<span>' + (p.goals + p.assists) + '</span>' +
          '<span style="color:var(--color-text-secondary);">' + p.appearances + '</span>' +
        '</div>').join('') +
      '</div>' + historyHtml;
  }

  function renderSeasonEnd() {
    const stats = G.seasonStats;
    return '<div style="text-align:center; padding: 1rem 0;">' +
      '<h2 style="margin:0 0 8px;">' + (G.year-1) + '/' + G.year.toString().slice(2) + ' season complete</h2>' +
      '<p style="color:var(--color-text-secondary); margin:0 0 1rem;">' + stats.played + ' games · ' + stats.won + 'W ' + stats.drawn + 'D ' + stats.lost + 'L · ' + stats.gf + ':' + stats.ga + '</p>' +
      (G.trophies.length ? '<div style="margin-bottom:1rem;">' + G.trophies.map(t=>'<span class="trophy">' + t + '</span>').join('') + '</div>' : '') +
      '<p style="color:var(--color-text-secondary); margin:0 0 1rem;">Ratings recalculated from season-long impact. Veterans regressed; new transfers shed prove-it discount.</p>' +
      '<button class="play-btn" style="max-width:280px; margin: 0 auto; display:block;" onclick="startNextSeason()">Begin ' + G.year + '/' + (G.year+1).toString().slice(2) + ' season</button>' +
    '</div>';
  }

  function deadwoodPlayers() {
    return G.squad.filter(p => {
      if (p.sold || p.onLoan) return false;
      const isDeadwood = p.ovr <= 83 || p.age >= 32;
      if (!isDeadwood) return false;
      const othersAtPos = G.squad.filter(x => !x.sold && x.id !== p.id && x.pos === p.pos);
      return othersAtPos.length > 0;
    });
  }

  function processOffseasonEvents() {
    const log = [];
    G.squad.filter(p => !p.sold && p.age >= 18 && p.age <= 23).forEach(p => {
      if (Math.random() >= 0.10) return;
      const boom = Math.random() < 0.5;
      if (boom) {
        const gain = 5 + Math.floor(Math.random() * 6);
        const before = p.ovr;
        p.ovr = Math.min(p.pot, Math.min(99, p.ovr + gain));
        const actual = p.ovr - before;
        if (actual > 0) log.push({ name: p.name, role: roleOf(p), type: 'boom', delta: actual, ovr: p.ovr });
      } else {
        const loss = 3 + Math.floor(Math.random() * 4);
        p.ovr = Math.max(50, p.ovr - loss);
        log.push({ name: p.name, role: roleOf(p), type: 'bust', delta: loss, ovr: p.ovr });
      }
    });
    G.offseasonLog = log;
  }

  function sellAllDeadwood() {
    deadwoodPlayers().forEach(p => {
      const price = playerValue(p);
      const kept = saleBudgetReturn(price);
      p.sold = true;
      G.budget += kept;
      G.starters = G.starters.filter(sid => sid !== p.id);
      G.incomingBids = G.incomingBids.filter(b => b.playerId !== p.id);
      G.transferMessages.push('Released ' + p.name + ' — £' + kept + 'm added to budget.');
    });
    autoPickXI();
    render();
  }

  function renderOffseasonEvents() {
    const log = G.offseasonLog || [];
    const loanLog = G.loanReturnLog || [];
    const deadwood = deadwoodPlayers();
    const totalReturn = deadwood.reduce((s, p) => s + saleBudgetReturn(playerValue(p)), 0);

    const youthHtml = '<div class="pnl"><div class="pnl-t">Youth breakthroughs & busts · ages 18–23</div>' +
      (log.length ? log.map(e => '<div style="display:flex; justify-content:space-between; align-items:center; padding:6px 0; border-bottom:0.5px solid var(--color-border-tertiary); font-size:12px;">' +
        '<span><strong>' + e.name + '</strong> <span style="color:var(--color-text-secondary);">' + e.role + '</span></span>' +
        '<span style="color:' + (e.type === 'boom' ? 'var(--color-text-success)' : 'var(--color-text-danger)') + '; font-weight:600;">' +
          (e.type === 'boom' ? '▲ +' + e.delta : '▼ −' + e.delta) + ' → OVR ' + e.ovr +
        '</span></div>').join('')
      : '<div style="font-size:12px; color:var(--color-text-secondary); padding:4px 0;">No dramatic changes this offseason — all young players progressed normally.</div>') +
    '</div>';

    const deadwoodHtml = '<div class="pnl"><div class="pnl-t">Squad clearance · ' + deadwood.length + ' players flagged</div>' +
      '<p style="font-size:12px; color:var(--color-text-secondary); margin:0 0 8px;">Rated ≤83 or aged 32+ and not the only player at their position.</p>' +
      (deadwood.length
        ? deadwood.sort((a,b) => b.age - a.age || a.ovr - b.ovr).map(p => {
            const price = playerValue(p);
            const kept = saleBudgetReturn(price);
            return '<div style="display:grid; grid-template-columns:1fr 52px 60px 60px; gap:8px; align-items:center; padding:6px 0; border-bottom:0.5px solid var(--color-border-tertiary); font-size:11px;">' +
              '<span>' + roleBadge(p) + ' <strong>' + p.name + '</strong> <span style="color:var(--color-text-secondary);">' + p.age + 'yo · OVR ' + p.ovr + '</span></span>' +
              '<span class="ovr ' + tierOf(p.ovr) + '">' + p.ovr + '</span>' +
              '<span style="color:var(--color-text-success);">+£' + kept + 'm</span>' +
              '<button class="btn sm pri" onclick="sellPlayer(' + p.id + ')">Sell</button>' +
            '</div>';
          }).join('') +
          '<div style="margin-top:10px; display:flex; gap:8px;">' +
            '<button class="btn pri" onclick="sellAllDeadwood()">Sell all · +£' + totalReturn + 'm</button>' +
          '</div>'
        : '<div style="font-size:12px; color:var(--color-text-secondary);">Squad is clean — no players flagged for clearance.</div>') +
    '</div>';

    const loanHtml = loanLog.length ? '<div class="pnl"><div class="pnl-t">Loan returns · ' + loanLog.length + ' player' + (loanLog.length > 1 ? 's' : '') + ' back</div>' +
      loanLog.map(e => {
        const outcomeColor = e.outcome === 'boom' ? 'var(--color-text-success)' : e.outcome === 'injury' ? 'var(--color-text-danger)' : 'var(--color-text-secondary)';
        const outcomeIcon = e.outcome === 'boom' ? '▲' : e.outcome === 'injury' ? '⚑' : '→';
        const detail = e.outcome === 'boom'
          ? (e.ovrDelta > 0 ? '+' + e.ovrDelta + ' OVR' : 'Stable') + (e.potDelta > 0 ? ' · POT +' + e.potDelta : '') + ' → OVR ' + e.ovr + ' / POT ' + e.pot
          : e.outcome === 'stag'
            ? 'No OVR gain · POT ' + e.potDelta + ' → OVR ' + e.ovr + ' / POT ' + e.pot
            : e.ovrDelta + ' OVR · returning injured → OVR ' + e.ovr;
        return '<div style="display:flex; justify-content:space-between; align-items:center; padding:6px 0; border-bottom:0.5px solid var(--color-border-tertiary); font-size:12px;">' +
          '<span><strong>' + e.name + '</strong> <span style="color:var(--color-text-secondary);">' + e.role + ' · from ' + e.club + '</span></span>' +
          '<span style="color:' + outcomeColor + '; font-weight:600;">' + outcomeIcon + ' ' + detail + '</span>' +
        '</div>';
      }).join('') +
    '</div>' : '';

    return '<div style="text-align:center; padding:0.5rem 0 1rem;">' +
        '<h2 style="margin:0 0 4px;">Offseason</h2>' +
        '<p style="color:var(--color-text-secondary); margin:0;">' + G.year + '/' + (G.year+1).toString().slice(2) + ' · Pre-season preparation</p>' +
      '</div>' +
      loanHtml + youthHtml + deadwoodHtml +
      '<button class="play-btn" style="margin-top:4px;" onclick="startPreseason()">Begin pre-season →</button>';
  }

  function startPreseason() { G.view = 'dash'; render(); }
  function startNextSeason() { processOffseasonEvents(); G.view = 'offseason'; render(); }
  function ordinal(n) { if (!n || n < 1) return '—'; const s=['th','st','nd','rd'], v=n%100; return n+(s[(v-20)%10]||s[v]||s[0]); }
  function setView(v) { G.view = v; render(); }
  function setTactic(t) { G.tactic = t; render(); }
  function setFormation(f) { G.formation = f; autoPickXI(); render(); }
  function autoPickXIAndRender() { autoPickXI(); render(); }

  const isReload = (performance.getEntriesByType('navigation')[0] || {}).type === 'reload';
  if (isReload) {
    localStorage.removeItem('manUtdCareer');
    newGame();
  } else {
    const saved = localStorage.getItem('manUtdCareer');
    if (saved) {
      try { G = JSON.parse(saved); render(); } catch(e) { newGame(); }
    } else {
      newGame();
    }
  }
</script>
</body>
</html>
